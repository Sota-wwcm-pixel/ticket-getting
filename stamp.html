<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>スタンプラリー - W2MC App</title>
<meta name="description" content="W2MC App — スタンプラリー。校内を回ってQRコードをスキャンし、スタンプを集めて特典をもらおう！">

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- jsQR ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
/* =============================================
   デザイントークン
============================================= */
:root {
  --blue:       #74A9D8;
  --deep-blue:  #3A6FA0;
  --mid-blue:   #5B90C2;
  --sky:        #A9D2F3;
  --light-sky:  #D6EDFB;
  --beige:      #F6EEE4;
  --cream:      #FFF9F2;
  --warm-gold:  #E8C97A;
  --text:         #243447;
  --text-muted:   #6B7C93;
  --text-light:   #94A8BC;

  --glass-bg:     rgba(255, 255, 255, 0.72);
  --glass-border: rgba(255, 255, 255, 0.65);
  --glass-shine:  rgba(255, 255, 255, 0.90);

  --shadow-sm:  0 4px 16px rgba(58, 111, 160, 0.10);
  --shadow-md:  0 8px 32px rgba(58, 111, 160, 0.14);
  --shadow-lg:  0 16px 48px rgba(58, 111, 160, 0.20);
  --shadow-nav: 0 -4px 24px rgba(58, 111, 160, 0.12), 0 8px 32px rgba(0, 0, 0, 0.14);

  --radius-sm:  16px;
  --radius-md:  24px;
  --radius-lg:  32px;
  --radius-full: 999px;

  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* =============================================
   リセット & ベース
============================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  color: var(--text);
  background:
    radial-gradient(ellipse at 10% 0%, rgba(116, 169, 216, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 10%, rgba(232, 201, 122, 0.10) 0%, transparent 45%),
    linear-gradient(170deg, #EBF5FF 0%, #F4EDE3 100%);
  min-height: 100vh;
  padding-bottom: calc(100px + env(safe-area-inset-bottom));
}

/* =============================================
   ヘッダー / ヒーロー
============================================= */
.hero {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.22) 0%, transparent 55%),
    linear-gradient(155deg, #3A6FA0 0%, #5B90C2 48%, #82BAE0 100%);
  padding:
    calc(env(safe-area-inset-top) + 26px)
    22px
    80px;
}

.hero-deco {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-circle {
  position: absolute;
  border-radius: 50%;
  background: white;
  opacity: 0.1;
  animation: float 6s ease-in-out infinite alternate;
}
.hero-circle-1 { width: 140px; height: 140px; top: -20px; right: -20px; }
.hero-circle-2 { width: 80px; height: 80px; bottom: 10px; left: -20px; animation-delay: -2s; }

@keyframes float {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-10px) scale(1.05); }
}

.logo {
  width: 150px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}

.page-title {
  color: white;
  margin-top: 14px;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 0.02em;
}

.wave {
  position: absolute;
  left: 0;
  bottom: -1px;
  width: 100%;
  height: 60px;
}

/* =============================================
   コンテンツ
============================================= */
.content {
  margin-top: -36px;
  padding: 0 16px;
  position: relative;
  z-index: 10;
}

/* 進捗カード */
.progress-card {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-shine);
  padding: 22px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  animation: cardFadeUp 0.4s var(--ease-smooth);
}

@keyframes cardFadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* サークルプログレス */
.circle-progress-wrap {
  position: relative;
  width: 90px; height: 90px;
  flex-shrink: 0;
}

.circle-progress-svg {
  transform: rotate(-90deg);
  width: 100%; height: 100%;
}

.circle-bg {
  fill: none;
  stroke: rgba(116, 169, 216, 0.15);
  stroke-width: 8;
}

.circle-bar {
  fill: none;
  stroke: url(#progressGradient);
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 251.2; /* 2 * PI * r (r=40) */
  stroke-dashoffset: 251.2;
  transition: stroke-dashoffset 0.8s var(--ease-smooth);
}

.progress-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.progress-num {
  font-family: 'Roboto', sans-serif;
  font-size: 26px;
  font-weight: 900;
  color: var(--deep-blue);
}

.progress-total {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.progress-info {
  flex: 1;
}

.progress-heading {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 6px;
}

.progress-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 12px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--mid-blue) 0%, var(--deep-blue) 100%);
  color: white;
  border: none;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 18px;
  border-radius: var(--radius-full);
  box-shadow: 0 4px 12px rgba(58, 111, 160, 0.25);
  cursor: pointer;
  transition: transform 0.2s var(--ease-bounce), box-shadow 0.2s;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(58, 111, 160, 0.35);
}
.btn-primary:active { transform: translateY(0); }

/* スタンプグリッド */
.stamp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stamp-cell {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm), inset 0 1px 0 var(--glass-shine);
  padding: 16px 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.2s var(--ease-bounce), background 0.2s;
  animation: cardFadeUp 0.5s var(--ease-smooth) both;
}

.stamp-cell.collected {
  background: rgba(232, 201, 122, 0.16);
  border-color: rgba(232, 201, 122, 0.5);
  box-shadow: 0 4px 16px rgba(232, 201, 122, 0.15);
}

.stamp-cell:hover {
  transform: translateY(-3px) scale(1.02);
}

.stamp-badge {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: rgba(116, 169, 216, 0.10);
  border: 1px dashed rgba(116, 169, 216, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 10px;
  transition: transform 0.4s var(--ease-bounce), background 0.4s;
  color: rgba(36, 52, 71, 0.15);
  filter: grayscale(1);
}

.stamp-cell.collected .stamp-badge {
  background: linear-gradient(135deg, #FFF0C0 0%, var(--warm-gold) 100%);
  border: 1px solid rgba(232, 201, 122, 0.6);
  color: initial;
  filter: grayscale(0);
  transform: rotate(10deg);
  animation: stampPop 0.5s var(--ease-bounce);
  box-shadow: 0 4px 10px rgba(232, 201, 122, 0.4);
}

@keyframes stampPop {
  0% { transform: scale(0.6) rotate(-20deg); }
  70% { transform: scale(1.15) rotate(15deg); }
  100% { transform: scale(1) rotate(10deg); }
}

.stamp-name {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 2px;
  color: var(--text);
}

.stamp-status {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-light);
}

.stamp-cell.collected .stamp-status {
  color: #B5933C;
  font-weight: 700;
}

/* =============================================
   スキャナーのビデオ/キャンバスオーバーレイ
============================================= */
.scanner-overlay {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: rgba(36, 52, 71, 0.9);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.scanner-overlay.show {
  opacity: 1;
  visibility: visible;
}

.scanner-viewport {
  position: relative;
  width: 240px; height: 240px;
  border-radius: var(--radius-lg);
  border: 2px solid rgba(255, 255, 255, 0.3);
  overflow: hidden;
  box-shadow: 0 0 40px rgba(116, 169, 216, 0.4);
  background: radial-gradient(circle, rgba(116, 169, 216, 0.05), rgba(0, 0, 0, 0.4));
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: 1;
}

/* レーザー線 */
.scanner-laser {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, #74A9D8, #D6EDFB, #74A9D8, transparent);
  box-shadow: 0 0 12px #74A9D8, 0 0 4px #74A9D8;
  animation: laserScan 2.0s linear infinite;
  z-index: 5;
}

@keyframes laserScan {
  0%, 100% { top: 0%; }
  50% { top: 100%; }
}

.scanner-corner {
  position: absolute;
  width: 20px; height: 20px;
  border: 3px solid var(--sky);
  z-index: 10;
}
.scanner-corner-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
.scanner-corner-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
.scanner-corner-bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
.scanner-corner-br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

.scanner-target {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  opacity: 0.25;
  animation: pulse 1.5s ease-in-out infinite;
  z-index: 2;
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.4; }
}

.scanner-text {
  color: white;
  margin-top: 24px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-align: center;
  padding: 0 20px;
}

.scanner-close-btn {
  margin-top: 36px;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: white;
  padding: 10px 24px;
  border-radius: var(--radius-full);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.scanner-close-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* =============================================
   ボトムナビゲーション
============================================= */
.bottom-nav {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: calc(10px + env(safe-area-inset-bottom));
  z-index: 9999;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border: 1px solid rgba(255, 255, 255, 0.70);
  border-radius: var(--radius-full);
  padding: 10px 6px;
  box-shadow: var(--shadow-nav);
  min-height: 68px;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  min-width: 56px;
  min-height: 48px;
  border-radius: var(--radius-md);
  padding: 6px 8px;
  transition: color 0.2s, background 0.2s, transform 0.18s var(--ease-bounce);
  position: relative;
}

.nav-item:hover {
  background: rgba(116,169,216,0.08);
  transform: translateY(-2px);
}
.nav-item:active { transform: scale(0.90); }

.nav-icon {
  font-size: 20px;
  margin-bottom: 3px;
  transition: transform 0.18s var(--ease-bounce);
}
.nav-item:hover .nav-icon { transform: scale(1.15); }

.nav-item.active {
  color: var(--deep-blue);
  font-weight: 700;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px;
  background: linear-gradient(90deg, var(--mid-blue), var(--blue));
  border-radius: var(--radius-full);
  animation: navIndicator 0.3s var(--ease-bounce);
}
@keyframes navIndicator {
  from { width: 0; opacity: 0; }
  to   { width: 28px; opacity: 1; }
}

::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>

<body>

  <header class="hero">
    <div class="hero-deco" aria-hidden="true">
      <div class="hero-circle hero-circle-1"></div>
      <div class="hero-circle hero-circle-2"></div>
    </div>
    <img src="Whatwecall.svg" alt="What we call Magic!" class="logo" />
    <h1 class="page-title">Stamp Rally</h1>
    
    <svg class="wave" viewBox="0 0 1440 110" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="progressGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#E8C97A" />
          <stop offset="100%" stop-color="#74A9D8" />
        </linearGradient>
      </defs>
      <path fill="#EBF5FF" d="M0,60 C240,90 480,30 720,55 C960,80 1200,20 1440,50 L1440,110 L0,110 Z" />
      <path fill="#F4EDE3" opacity="0.55" d="M0,75 C200,95 440,50 720,68 C1000,86 1240,40 1440,62 L1440,110 L0,110 Z" />
    </svg>
  </header>

  <main class="content">
    
    <!-- 進捗カード -->
    <section class="progress-card">
      <div class="circle-progress-wrap" aria-hidden="true">
        <svg class="circle-progress-svg" viewBox="0 0 100 100">
          <circle class="circle-bg" cx="50" cy="50" r="40" />
          <circle class="circle-bar" id="progressCircle" cx="50" cy="50" r="40" />
        </svg>
        <div class="progress-text">
          <span class="progress-num" id="progressCount">0</span>
          <span class="progress-total">/ 8</span>
        </div>
      </div>
      <div class="progress-info">
        <h2 class="progress-heading">ラリー進捗</h2>
        <p class="progress-desc">校内に設置されたQRコードを読み込んでスタンプを集めよう！すべて集めると景品があります。</p>
        <button class="btn-primary" onclick="startCameraScan()">
          <span>📷</span> QRコードをスキャン
        </button>
      </div>
    </section>

    <!-- グリッド -->
    <h3 style="font-size: 15px; font-weight: 700; margin: 16px 4px 10px;">スタンプポイント</h3>
    <section class="stamp-grid" id="stampGrid">
      <!-- JSでセル生成 -->
    </section>

  </main>

  <!-- スキャナーのビデオ/キャンバス画面 -->
  <div class="scanner-overlay" id="scannerOverlay">
    <div class="scanner-viewport">
      <canvas id="canvas"></canvas>
      <div class="scanner-laser"></div>
      <div class="scanner-corner scanner-corner-tl"></div>
      <div class="scanner-corner scanner-corner-tr"></div>
      <div class="scanner-corner scanner-corner-bl"></div>
      <div class="scanner-corner scanner-corner-br"></div>
      <div class="scanner-target">📱</div>
    </div>
    <div class="scanner-text" id="scannerText">QRコードをスキャンしています...</div>
    <button class="scanner-close-btn" onclick="stopCameraScan()">キャンセル</button>
  </div>

  <!-- ボトムナビゲーション -->
  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <a href="index.html" class="nav-item" data-page="index">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span>Home</span>
    </a>
    <a href="map.html" class="nav-item" data-page="map">
      <span class="nav-icon" aria-hidden="true">🗺️</span>
      <span>Map</span>
    </a>
    <a href="ticket.get.html" class="nav-item" data-page="ticket">
      <span class="nav-icon" aria-hidden="true">🎟️</span>
      <span>Ticket</span>
    </a>
    <a href="saved.html" class="nav-item" data-page="saved">
      <span class="nav-icon" aria-hidden="true">⭐</span>
      <span>Saved</span>
    </a>
    <a href="my.html" class="nav-item" data-page="my">
      <span class="nav-icon" aria-hidden="true">👤</span>
      <span>My</span>
    </a>
  </nav>

  <script>
    const STAMPS_KEY = 'wwcm_stamps';

    const STAMP_SPOTS = [
      { id: 'spot_1', name: '体育館 (演劇)', emoji: '🎭' },
      { id: 'spot_2', name: '講堂 (軽音)', emoji: '🎵' },
      { id: 'spot_3', name: '3F展示室 (D研)', emoji: '✨' },
      { id: 'spot_4', name: '中庭 (模擬店)', emoji: '🎪' },
      { id: 'spot_5', name: '理科室 (実験)', emoji: '🧪' },
      { id: 'spot_6', name: '美術室 (展示)', emoji: '🎨' },
      { id: 'spot_7', name: '図書室 (カフェ)', emoji: '📚' },
      { id: 'spot_8', name: '屋上 (展望)', emoji: '🔭' }
    ];

    // ローカルストレージからスタンプ取得
    function getCollectedStamps() {
      try {
        const stored = localStorage.getItem(STAMPS_KEY);
        return stored ? JSON.parse(stored) : [];
      } catch (e) {
        return [];
      }
    }

    // レンダリング処理
    function renderStampRally() {
      const collected = getCollectedStamps();
      const grid = document.getElementById('stampGrid');
      grid.innerHTML = '';

      STAMP_SPOTS.forEach((spot, index) => {
        const isCollected = collected.includes(spot.id);
        const cell = document.createElement('div');
        cell.className = `stamp-cell ${isCollected ? 'collected' : ''}`;
        cell.style.animationDelay = `${index * 0.05}s`;

        cell.innerHTML = `
          <div class="stamp-badge">${isCollected ? spot.emoji : '📍'}</div>
          <div class="stamp-name">${spot.name.split(' ')[0]}</div>
          <div class="stamp-status">${isCollected ? '集めました！' : '未獲得'}</div>
        `;
        grid.appendChild(cell);
      });

      // 進捗表示
      const count = collected.length;
      document.getElementById('progressCount').textContent = count;

      // 円形のゲージ更新
      const r = 40;
      const c = 2 * Math.PI * r; // 251.2
      const offset = c - (count / STAMP_SPOTS.length) * c;
      document.getElementById('progressCircle').style.strokeDashoffset = offset;
    }

    // ===== リアルカメラQRスキャナー処理 =====
    let videoStream = null;
    let scanning = false;
    let animationFrameId = null;
    let mockScanTimeout = null;

    // スキャン起動
    window.startCameraScan = function() {
      const video = document.createElement('video');
      video.setAttribute('autoplay', '');
      video.setAttribute('playsinline', ''); // iOS Safari対応

      const canvasElement = document.getElementById('canvas');
      const canvas = canvasElement.getContext('2d');
      const overlay = document.getElementById('scannerOverlay');
      const text = document.getElementById('scannerText');

      overlay.classList.add('show');
      canvasElement.style.display = 'block';
      text.textContent = 'カメラを起動しています...';

      // navigator.mediaDevices.getUserMedia が存在するか確認
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(function(stream) {
            videoStream = stream;
            video.srcObject = stream;
            video.addEventListener('loadedmetadata', () => {
              video.play();
              scanning = true;
              text.textContent = 'スタンプのQRコードをスキャンしてください';
              animationFrameId = requestAnimationFrame(tick);
            });
          })
          .catch(function(err) {
            console.warn("Camera access failed: ", err);
            // カメラ権限拒否、あるいは非セキュア環境などのフォールバック
            triggerMockFallback('カメラを利用できません。シミュレータを起動します。');
          });
      } else {
        // メディアデバイス自体が存在しない場合のフォールバック
        triggerMockFallback('カメラ非対応環境のため、シミュレータを起動します。');
      }

      function tick() {
        if (!scanning) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvasElement.height = 240;
          canvasElement.width = 240;
          // アスペクト比を維持しつつ中央をクリップして描画
          const size = Math.min(video.videoWidth, video.videoHeight);
          const sx = (video.videoWidth - size) / 2;
          const sy = (video.videoHeight - size) / 2;
          canvas.drawImage(video, sx, sy, size, size, 0, 0, 240, 240);

          const imageData = canvas.getImageData(0, 0, 240, 240);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
          });

          if (code) {
            const data = code.data;
            let matchedSpot = null;

            // QRデータに "spot_" が含まれているか検証
            if (data.includes('spot_')) {
              const match = data.match(/spot_[1-8]/);
              if (match) {
                const spotId = match[0];
                matchedSpot = STAMP_SPOTS.find(s => s.id === spotId);
              }
            }

            if (matchedSpot) {
              scanning = false;
              text.innerHTML = `🎉 スキャン成功！<br>「${matchedSpot.name}」を獲得！`;

              const collected = getCollectedStamps();
              if (!collected.includes(matchedSpot.id)) {
                collected.push(matchedSpot.id);
                localStorage.setItem(STAMPS_KEY, JSON.stringify(collected));
              }

              renderStampRally();
              setTimeout(stopCameraScan, 1800);
              return;
            } else {
              text.textContent = '無効なQRです。スタンプ用のQRをスキャンしてください。';
            }
          }
        }
        animationFrameId = requestAnimationFrame(tick);
      }
    };

    // シミュレーター（フォールバック）
    function triggerMockFallback(message) {
      const text = document.getElementById('scannerText');
      text.textContent = message;
      document.getElementById('canvas').style.display = 'none';

      mockScanTimeout = setTimeout(() => {
        text.textContent = 'QRコードを探しています...';
        
        mockScanTimeout = setTimeout(() => {
          const collected = getCollectedStamps();
          const uncollected = STAMP_SPOTS.filter(spot => !collected.includes(spot.id));

          if (uncollected.length === 0) {
            text.innerHTML = '🎉 すべてのスタンプを集めました！特典交換所へ行ってください。';
            setTimeout(stopCameraScan, 2000);
            return;
          }

          const nextSpot = uncollected[Math.floor(Math.random() * uncollected.length)];
          collected.push(nextSpot.id);
          localStorage.setItem(STAMPS_KEY, JSON.stringify(collected));

          text.innerHTML = `✨ スキャン成功 (シミュレータ)<br>「${nextSpot.name}」を獲得しました！`;
          renderStampRally();

          setTimeout(stopCameraScan, 1800);
        }, 1500);
      }, 1200);
    }

    // スキャン停止
    window.stopCameraScan = function() {
      scanning = false;
      clearTimeout(mockScanTimeout);
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      document.getElementById('canvas').style.display = 'none';
      document.getElementById('scannerOverlay').classList.remove('show');
    };

    // ボトムナビのアクティブ状態の自動設定
    function setActiveNav() {
      const currentFile = location.pathname.split('/').pop() || 'index.html';
      const navItems = document.querySelectorAll('.nav-item');

      navItems.forEach(item => {
        const itemFile = (item.getAttribute('href') || '').split('/').pop();
        const isActive =
          itemFile === currentFile ||
          (currentFile === '' && itemFile === 'index.html');

        if (isActive) {
          item.classList.add('active');
          item.setAttribute('aria-current', 'page');
        } else {
          item.classList.remove('active');
          item.removeAttribute('aria-current');
        }
      });
    }

    // デモ用にいくつかのスタンプを最初から追加しておく（初回のみ）
    function setupDemoStamps() {
      try {
        const existing = localStorage.getItem(STAMPS_KEY);
        if (!existing) {
          const initial = ['spot_1', 'spot_3', 'spot_5'];
          localStorage.setItem(STAMPS_KEY, JSON.stringify(initial));
        }
      } catch (e) {}
    }

    setupDemoStamps();
    renderStampRally();
    setActiveNav();
  </script>
</body>
</html>
