<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公式webアプリ　W2MC App -What we call Magic!</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="logo.js"></script>
<style>
  :root {
    --primary-blue: #0066ff;
    --bright-cyan: #0cc0df;
    --light-cyan: #1eabf9;
    --dark-navy: #0a1628;
    --deep-blue: #0d2247;
    --accent-purple: #5251c2;
    --accent-green: #17fd48;
    --white: #f8f4ee;
    --cream: #f0e9d6;
    --text: #1a1a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, var(--dark-navy) 0%, var(--deep-blue) 50%, var(--primary-blue) 100%);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(12,192,223,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(30,171,249,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(82,81,194,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(23,253,72,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(12,192,223,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 50%, rgba(30,171,249,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem 1.5rem 6rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-top: 1rem;
  }

  .logo-container {
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-container img {
    max-width: 100%;
    height: auto;
    width: 320px;
    filter: drop-shadow(0 4px 20px rgba(12,192,223,0.3));
  }

  .sparkle {
    color: var(--bright-cyan);
    font-size: 1.5rem;
    letter-spacing: 0.3em;
    display: block;
    margin-bottom: 0.5rem;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--bright-cyan);
    letter-spacing: 0.02em;
    line-height: 1.2;
    display: none;
  }

  .subtitle {
    font-size: 1.6rem;
    color: rgba(248,244,238,0.7);
    letter-spacing: 0.1em;
    margin-top: 1rem;
    font-weight: 700;
  }

  /* Form card */
  .card {
    background: linear-gradient(135deg, rgba(0,74,173,0.15) 0%, rgba(12,192,223,0.1) 100%);
    border: 1px solid rgba(12,192,223,0.4);
    border-radius: 16px;
    padding: 2rem;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(12,192,223,0.2);
  }

  .card-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--bright-cyan);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(12,192,223,0.4), transparent);
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: rgba(248,244,238,0.7);
    margin-bottom: 0.75rem;
    letter-spacing: 0.05em;
  }

  /* Type selector */
  .type-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
  }

  .type-btn {
    background: rgba(12,192,223,0.08);
    border: 2px solid rgba(12,192,223,0.3);
    border-radius: 10px;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
  }

  .type-btn:hover {
    background: rgba(12,192,223,0.2);
    border-color: rgba(12,192,223,0.8);
    transform: translateY(-2px);
  }

  .type-btn.selected {
    background: rgba(12,192,223,0.35);
    border-color: var(--bright-cyan);
    box-shadow: 0 0 20px rgba(12,192,223,0.5);
    transform: translateY(-2px);
  }

  .type-btn .type-icon { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }
  .type-btn .type-name { font-size: 0.9rem; font-weight: 500; }
  .type-btn .type-note { font-size: 0.7rem; color: rgba(248,244,238,0.5); margin-top: 0.2rem; }

  /* Count selector */
  .count-selector {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(12,192,223,0.08);
    border: 2px solid rgba(12,192,223,0.3);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }

  .count-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(12,192,223,0.6);
    background: rgba(12,192,223,0.2);
    color: var(--bright-cyan);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: inherit;
    font-weight: bold;
  }

  .count-btn:hover { 
    background: rgba(12,192,223,0.35);
    border-color: var(--bright-cyan);
    transform: scale(1.1);
  }

  .count-display {
    flex: 1;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    color: var(--white);
  }

  .count-label {
    font-size: 0.75rem;
    color: rgba(248,244,238,0.5);
  }

  /* Nickname input */
  .nickname-input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: rgba(12,192,223,0.08);
    border: 2px solid rgba(12,192,223,0.3);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    outline: none;
    transition: all 0.2s ease;
  }

  .nickname-input::placeholder {
    color: rgba(248,244,238,0.3);
  }

  .nickname-input:focus {
    background: rgba(12,192,223,0.12);
    border-color: var(--bright-cyan);
    box-shadow: 0 0 15px rgba(12,192,223,0.3);
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--bright-cyan) 0%, var(--light-cyan) 50%, var(--bright-cyan) 100%);
    background-size: 200% 100%;
    border: none;
    border-radius: 10px;
    color: var(--dark-navy);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    margin-top: 0.5rem;
    box-shadow: 0 4px 15px rgba(12,192,223,0.3);
  }

  .submit-btn:hover {
    background-position: 100% 0;
    box-shadow: 0 8px 30px rgba(12,192,223,0.6);
    transform: translateY(-2px);
  }

  .submit-btn:active { transform: translateY(0); }

  /* Ticket display */
  .ticket-wrap {
    display: none;
    animation: fadeUp 0.6s ease forwards;
  }

  .ticket-wrap.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tickets-container {
    display: flex;
    gap: 1.5rem;
    overflow-x: auto;
    margin-bottom: 1.5rem;
    padding: 0 1.5rem 1rem 1.5rem;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
    transition: mask-image 0.3s ease, -webkit-mask-image 0.3s ease;
  }

  .tickets-container.at-start {
    mask-image: linear-gradient(to right, black 0%, black 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, black 0%, black 90%, transparent 100%);
  }

  .tickets-container.at-end {
    mask-image: linear-gradient(to right, transparent 0%, black 10%, black 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 100%);
  }

  .tickets-container.at-both {
    mask-image: none;
    -webkit-mask-image: none;
  }

  .tickets-container::-webkit-scrollbar {
    height: 4px;
  }

  .tickets-container::-webkit-scrollbar-track {
    background: rgba(12,192,223,0.1);
    border-radius: 2px;
  }

  .tickets-container::-webkit-scrollbar-thumb {
    background: rgba(12,192,223,0.4);
    border-radius: 2px;
  }

  .tickets-container::-webkit-scrollbar-thumb:hover {
    background: rgba(12,192,223,0.6);
  }

  .ticket-slide {
    flex: 0 0 calc(100% - 3rem);
    min-width: 0;
    scroll-snap-align: center;
  }

  /* ====================================================
     チケット — ダークテーマ（アプリデザイン統一版）
     html2canvas 対応: 疑似要素・repeating-gradient 不使用
  ==================================================== */

  .ticket {
    background: #f8f4ee;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(12,192,223,0.18);
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ロゴSVGの青い部分を白抜きにする（ダークヘッダー対応）*/
  .ticket-header .ticket-logo-svg [fill="#004aad"] { fill: #ffffff !important; }
  .ticket-header .ticket-logo-svg path[fill="#004aad"] { fill: #ffffff !important; }
  .ticket-header .ticket-logo-svg [fill="#0cc0df"] { fill: rgba(12,192,223,0.9) !important; }

  .ticket-header {
    background: linear-gradient(160deg, #002b66 0%, #0052cc 55%, #0066ff 100%);
    padding: 1rem 1.2rem 0;
    text-align: center;
    position: relative;
    flex-shrink: 0;
  }

  .ticket-header::after {
    display: none !important;
  }

  .ticket-event {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.24em;
    color: rgba(12,192,223,0.85);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .ticket-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.3rem;
    color: #ffffff;
    font-weight: 700;
  }

  /* ヘッダー下部の波形SVGラッパー */
  .ticket-header-wave-wrap {
    display: block;
    line-height: 0;
    margin: 0.35rem -1.2rem 0;
  }

  .ticket-body {
    background: #f8f4ee;
    padding: 0.9rem 1.2rem calc(42px + 0.9rem);
    color: #1a1a2e;
    flex: 1;
    box-sizing: border-box;
  }

  .ticket-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.4rem;
  }

  .ticket-info-label {
    font-size: 0.67rem;
    color: rgba(26,26,46,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .ticket-info-value {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: #1a1a2e;
    font-weight: 500;
  }

  /* もぎり線（旧 divider を SVG に置換）*/
  .ticket-divider { display: none; }
  .ticket-tear {
    margin: 0.55rem -1.2rem;
    display: block;
    line-height: 0;
  }

  .ticket-type-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .badge-adult {
    background: rgba(0,102,255,0.12);
    color: var(--primary-blue);
    border: 1px solid rgba(0,102,255,0.28);
  }

  .badge-middle {
    background: rgba(12,192,223,0.12);
    color: #006d8f;
    border: 1px solid rgba(12,192,223,0.35);
  }

  .badge-child {
    background: rgba(82,81,194,0.12);
    color: #3d3c7a;
    border: 1px solid rgba(82,81,194,0.28);
  }

  .qr-section {
    text-align: center;
    padding: 0.5rem 0 0.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #qrcode {
    display: inline-block;
    padding: 0.6rem;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.13);
  }

  .qr-note {
    font-size: 0.64rem;
    color: rgba(26,26,46,0.5);
    margin-top: 0.55rem;
    letter-spacing: 0.04em;
  }

  /* QRコードのcanvas要素を非表示にしてimgのみ表示 */
  .qr-section > div > canvas {
    display: none !important;
  }

  /* チケットフッター */
  .ticket-footer {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    height: 42px;
    background: linear-gradient(135deg, #002b66 0%, #0052cc 100%);
    padding: 0.55rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
  }

  .ticket-id {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: rgba(12,192,223,0.5);
    letter-spacing: 0.1em;
  }

  .ticket-dots { display: flex; gap: 4px; }

  .ticket-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(12,192,223,0.25);
  }
  .ticket-dot:nth-child(2) { background: rgba(12,192,223,0.55); }
  .ticket-dot:nth-child(3) { background: var(--bright-cyan); }

  /* (フッタースタイルは上部に移動) */

  /* Delete button */
  .ticket-delete-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(192,57,43,0.2);
    border: 2px solid rgba(192,57,43,0.6);
    color: #e74c3c;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 5;
  }

  .ticket-delete-btn:hover {
    background: rgba(192,57,43,0.4);
    border-color: #e74c3c;
    transform: scale(1.1);
  }

  /* Simulate admit button */
  .simulate-btn {
    width: 100%;
    padding: 0.875rem;
    background: rgba(23,253,72,0.15);
    border: 2px solid rgba(23,253,72,0.6);
    border-radius: 10px;
    color: rgba(23,253,72,0.9);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    margin-top: 1rem;
    font-weight: 600;
  }

  .simulate-btn:hover {
    background: rgba(23,253,72,0.25);
    border-color: rgba(23,253,72,0.9);
    box-shadow: 0 4px 15px rgba(23,253,72,0.3);
    transform: translateY(-1px);
  }

  .back-btn {
    width: 100%;
    padding: 0.875rem;
    background: rgba(248,244,238,0.1);
    border: 2px solid rgba(248,244,238,0.3);
    border-radius: 10px;
    color: rgba(248,244,238,0.8);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    margin-top: 0.75rem;
    font-weight: 600;
  }

  .back-btn:hover {
    background: rgba(248,244,238,0.15);
    border-color: rgba(248,244,238,0.6);
    color: var(--white);
    box-shadow: 0 4px 15px rgba(248,244,238,0.2);
    transform: translateY(-1px);
  }

  /* Scanner page link */
  .scanner-link {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.7rem;
    color: rgba(248,244,238,0.3);
    letter-spacing: 0.1em;
  }

  .scanner-link a {
    color: rgba(12,192,223,0.6);
    text-decoration: none;
    border-bottom: 1px solid rgba(12,192,223,0.3);
    padding-bottom: 1px;
  }

  .scanner-link a:hover { color: var(--bright-cyan); }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(10,22,40,0.8);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(12,192,223,0.2);
    z-index: 50;
  }

  .footer-logo {
    height: 40px;
    display: flex;
    align-items: center;
  }

  .footer-logo img {
    height: 100%;
    width: auto;
    filter: drop-shadow(0 2px 8px rgba(12,192,223,0.2));
  }

  .footer-text {
    font-size: 0.65rem;
    color: rgba(248,244,238,0.4);
    margin-left: 1rem;
    letter-spacing: 0.05em;
  }

  .ticket-container { position: relative; }
/* =========================
   Bottom Navigation
========================= */

.bottom-nav {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: calc(10px + env(safe-area-inset-bottom));
  z-index: 9999;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);

  border: 1px solid rgba(255, 255, 255, 0.70);
  border-radius: 999px;
  padding: 10px 6px;
  box-shadow: 0 -4px 24px rgba(58, 111, 160, 0.12), 0 8px 32px rgba(0, 0, 0, 0.14);

  min-height: 68px;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: #6B7C93;
  font-size: 11px;
  font-weight: 500;
  min-width: 56px;
  min-height: 48px;
  border-radius: 24px;
  padding: 6px 8px;
  transition: color 0.2s, background 0.2s, transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}

.nav-item:hover {
  background: rgba(116,169,216,0.08);
  transform: translateY(-2px);
}
.nav-item:active { transform: scale(0.90); }

.nav-icon {
  font-size: 20px;
  margin-bottom: 3px;
  transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-item:hover .nav-icon { transform: scale(1.15); }

.nav-item.active {
  color: #3A6FA0;
  font-weight: 700;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px;
  background: linear-gradient(90deg, #5B90C2, #74A9D8);
  border-radius: 999px;
  animation: navIndicator 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes navIndicator {
  from { width: 0; opacity: 0; }
  to   { width: 28px; opacity: 1; }
}
 /* visibleクラスがつくと表示 */

  /* 認証時（入場済み）に表示される右端の半円切り欠き効果（パンチ穴） */
  .ticket-admitted-cut {
    position: absolute;
    right: -11px;
    bottom: 113px; /* QRコードの右横の高さに合わせる */
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background-color: #0a1628; /* アプリ背景のダークネイビーと同じ色 */
    display: none;
    z-index: 10;
    box-shadow: inset 3px 0 5px rgba(0, 0, 0, 0.4); /* 内側に影をつけて紙の切り取り感を表現 */
  }
  .ticket-admitted-cut.visible {
    display: block;
  }
</style>



<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.save-ticket-button:hover{
opacity:0.9;
}
</style>


<style>
.save-ticket-button{
margin-top:14px;
padding:10px 18px;
background:#222;
color:white;
border:none;

<style>
  /* Disney Resort Line Free Ticket size adjustment
     添付画像から計測したフリーきっぷ本体サイズ: 307px × 450px */
  :root {
    --resortline-ticket-width: 307px;
    --resortline-ticket-height: 450px;
  }

  .tickets-container {
    gap: 1rem !important;
    padding: 0 1rem 1rem !important;
    align-items: flex-start !important;
  }

  .ticket-slide {
    flex: 0 0 var(--resortline-ticket-width) !important;
    width: var(--resortline-ticket-width) !important;
    max-width: var(--resortline-ticket-width) !important;
    min-width: var(--resortline-ticket-width) !important;
    scroll-snap-align: center !important;
  }

  .ticket {
    width: var(--resortline-ticket-width) !important;
    height: var(--resortline-ticket-height) !important;
    min-height: var(--resortline-ticket-height) !important;
    max-height: var(--resortline-ticket-height) !important;
    aspect-ratio: 307 / 450 !important;
    border-radius: 14px !important;
    overflow: hidden !important;
    display: flex !important;
    flex-direction: column !important;
  }

  .ticket-header {
    flex: 0 0 86px !important;
    padding: 0.85rem 0.9rem 1rem !important;
  }

  .ticket-header::after {
    display: none !important;
  }

  .ticket-event {
    font-size: 0.58rem !important;
    margin-bottom: 0.15rem !important;
  }

  .ticket-title {
    font-size: 1.05rem !important;
    line-height: 1.15 !important;
  }

  .ticket-title img {
    max-width: 190px !important;
    height: auto !important;
  }

  .ticket-body {
    flex: 1 1 auto !important;
    min-height: 0 !important;
    padding: 1.1rem 1rem calc(38px + 0.65rem) !important;
    display: flex !important;
    flex-direction: column !important;
    box-sizing: border-box !important;
  }

  .ticket-info-row {
    margin-bottom: 0.35rem !important;
    gap: 0.5rem !important;
  }

  .ticket-info-label {
    font-size: 0.58rem !important;
  }

  .ticket-info-value {
    font-size: 0.74rem !important;
    text-align: right !important;
  }

  .ticket-divider {
    margin: 0.55rem 0 !important;
  }

  .ticket-type-badge {
    padding: 0.22rem 0.6rem !important;
    font-size: 0.62rem !important;
  }

  .qr-section {
    margin-top: auto !important;
    padding: 0.35rem 0 0 !important;
  }

  .qr-section > div:first-child {
    display: inline-block !important;
    padding: 0.45rem !important;
    background: #fff !important;
    border-radius: 7px !important;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12) !important;
  }

  .qr-section canvas,
  .qr-section img {
    display: block !important;
  }

  .qr-note {
    font-size: 0.56rem !important;
    margin-top: 0.42rem !important;
  }

  .ticket-footer {
    position: absolute !important;
    bottom: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 38px !important;
    padding: 0.5rem 0.9rem !important;
    box-sizing: border-box !important;
  }

  .ticket-id {
    font-size: 0.52rem !important;
  }

  .ticket-dot {
    width: 5px !important;
    height: 5px !important;
  }

  .ticket-delete-btn {
    top: 0.55rem !important;
    right: 0.55rem !important;
    width: 26px !important;
    height: 26px !important;
    font-size: 0.95rem !important;
  }

  

  .ticket-slide > button[onclick^="downloadTicketById"] {
    width: var(--resortline-ticket-width) !important;
  }
</style>
</head>

            <button class="count-btn" onclick="changeCount('adult',1)">＋</button>
          </div>
        </div>

        <div style="background:rgba(12,192,223,0.08);border:2px solid rgba(12,192,223,0.3);border-radius:10px;padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">

            <span style="font-size:1.4rem;">🎒</span>
            <div>
              <div style="font-size:0.9rem;font-weight:500;color:var(--white);">中人</div>
              <div style="font-size:0.7rem;color:rgba(248,244,238,0.4);">中高生</div>
            </div>
          </div>
          <div class="count-selector" style="border:none;background:none;padding:0;gap:0.5rem;width:auto;">
            <button class="count-btn" onclick="changeCount('middle',-1)">−</button>
            <div class="count-display" id="countMiddle" style="font-size:1.2rem;min-width:28px;">0</div>
            <button class="count-btn" onclick="changeCount('middle',1)">＋</button>
          </div>
        </div>

        <div style="background:rgba(12,192,223,0.08);border:2px solid rgba(12,192,223,0.3);border-radius:10px;padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">

<script>
  const SCANNER_PASSWORD = '00';
  const STORAGE_KEY = 'wwcm_tickets';

  function checkPassword(e) {
    e.preventDefault();
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').textContent = '';
    document.getElementById('pwModal').style.display = 'flex';
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }

  function submitPassword() {
    const input = document.getElementById('pwInput').value;
    if (input === SCANNER_PASSWORD) {
      document.getElementById('pwModal').style.display = 'none';
      window.location.href = 'scanner (2).html';
    } else {
      document.getElementById('pwError').textContent = 'パスワードが違います';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function closeModal() {
    document.getElementById('pwModal').style.display = 'none';
  }

  const counts = { adult: 0, middle: 0, child: 0 };
  let tickets = [];

  const typeConfig = {
    adult:  { label: '大人', icon: '🎩', badgeClass: 'badge-adult' },
    middle: { label: '中人', icon: '🎒', badgeClass: 'badge-middle' },
    child:  { label: '小人', icon: '⚽️', badgeClass: 'badge-child' },
  };

// ページ読み込み時に保存済みチケットを復元
window.addEventListener('load', () => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);

    if (saved) {
      tickets = JSON.parse(saved);

      // チケットがあるなら自動表示
      if (tickets.length > 0) {
        displayTickets();
      }
    }

  } catch(e) {
    localStorage.removeItem(STORAGE_KEY);
  }
});

  function changeCount(type, delta) {
    counts[type] = Math.max(0, Math.min(10, counts[type] + delta));
    document.getElementById('count' + type.charAt(0).toUpperCase() + type.slice(1)).textContent = counts[type];
    const total = counts.adult + counts.middle + counts.child;
    document.getElementById('totalCount').textContent = total;
  }

  function generateId() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let id = 'WWCM-';
    for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id;
  }

  function buildTicketHTML(ticket, index) {
    const cfg = typeConfig[ticket.type];
    const qrId = 'qr-' + ticket.id;
    const ticketNumber = index + 1;
    const totalTickets = tickets.length;
    // html2canvas 対応の新デザイン
    return `
      <div class="ticket-slide" id="slide-${ticket.id}">
        <div class="ticket" id="ticket-el-${ticket.id}" style="position:relative;">
          <button class="ticket-delete-btn" onclick="deleteTicket('${ticket.id}')">✕</button>
          <!-- 認証時（入場済み）に表示される右端の半円切り取り効果 -->
          <div class="ticket-admitted-cut" id="admitted-${ticket.id}"></div>

          <div class="ticket-header">
            <div class="ticket-event">HONGOFES 2026</div>
            <div class="ticket-title">
              ${TICKET_LOGO_SVG}
            </div>
            <!-- 波形（インラインSVG、html2canvas対応・overflow不要） -->
            <div class="ticket-header-wave-wrap">
              <svg viewBox="0 0 307 22" preserveAspectRatio="none" style="display:block; width:100%; height:22px;" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0,6 C 77,17 230,17 307,6 L 307,22 L 0,22 Z" fill="#f8f4ee"/>
              </svg>
            </div>
          </div>

          <div class="ticket-body">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.7rem;">
              <span id="nickname-${ticket.id}" onclick="editNickname('${ticket.id}')" style="cursor:pointer;font-size:1rem;color:#1a1a2e;font-weight:900;font-family:'Roboto',sans-serif;letter-spacing:0.05em;max-width:60%;word-break:break-all;">${ticket.nickname || 'タップして編集'}</span>
              <span style="font-size:0.6rem;color:rgba(26,26,46,0.42);letter-spacing:0.1em;text-transform:uppercase;">${ticketNumber}/${totalTickets}</span>
            </div>
            <div class="ticket-info-row">
              <span class="ticket-info-label">種別</span>
              <span class="ticket-type-badge ${cfg.badgeClass}">${cfg.icon} ${cfg.label}</span>
            </div>
            <div class="ticket-info-row" style="margin-top:0.3rem">
              <span class="ticket-info-label">発券日時</span>
              <span class="ticket-info-value">${ticket.issuedAt}</span>
            </div>

            <!-- もぎり線（インラインSVG）QRコードと同y座標の端をもぎる -->
            <div class="ticket-tear">
              <svg viewBox="0 0 307 20" width="100%" height="20" style="display:block; overflow:visible;" xmlns="http://www.w3.org/2000/svg">
                <circle cx="-0.5" cy="10" r="11" fill="#0a1628"/>
                <circle cx="307.5" cy="10" r="11" fill="#0a1628"/>
                <line x1="15" y1="10" x2="292" y2="10" stroke="rgba(26,26,46,0.2)" stroke-width="1.5" stroke-dasharray="5,3"/>
              </svg>
            </div>

            <div class="qr-section">
              <div id="${qrId}"></div>
              <div class="qr-note">入場口でこのQRコードをご提示ください</div>
            </div>
          </div>

          <div class="ticket-footer">
            <span class="ticket-id">${ticket.id}</span>
            <div class="ticket-dots">
              <div class="ticket-dot"></div>
              <div class="ticket-dot"></div>
              <div class="ticket-dot"></div>
            </div>
          </div>
        </div>

        <button onclick="downloadTicketById('${ticket.id}')" style="
          width:100%;margin-top:0.5rem;padding:0.6rem;
          background:rgba(12,192,223,0.12);border:1.5px solid rgba(12,192,223,0.4);
          border-radius:8px;color:rgba(12,192,223,0.9);font-family:'Noto Sans JP',sans-serif;
          font-size:0.78rem;font-weight:600;cursor:pointer;letter-spacing:0.08em;
          transition:all 0.2s ease;"
          onmouseover="this.style.background='rgba(12,192,223,0.25)'"
          onmouseout="this.style.background='rgba(12,192,223,0.12)'">
          ⬇ このチケットを保存
        </button>

      </div>`;
  }

  function saveTickets() {

    localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
  }

  function displayTickets() {
    const container = document.getElementById('ticketsContainer');
    if (tickets.length === 0) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:rgba(248,244,238,0.5);font-size:0.95rem;letter-spacing:0.05em;">取得済みのチケットはありません</div>';
      document.getElementById('formCard').style.display = 'none';
      const wrap = document.getElementById('ticketWrap');
      wrap.classList.add('visible');
      wrap.style.display = 'block';
      return;
    }
    
    container.innerHTML = tickets.map((t, i) => buildTicketHTML(t, i)).join('');
    
    // QRコードの生成
    setTimeout(() => {
      tickets.forEach((t) => {
        const qrId = 'qr-' + t.id;
        const elem = document.getElementById(qrId);
        if (elem && elem.children.length === 0) {
          new QRCode(elem, {
            text: JSON.stringify({ id: t.id, type: t.type, issued: t.issued }),
            width: 116, height: 116,
            colorDark: '#000000', colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        }
      });
    }, 50);

    document.getElementById('formCard').style.display = 'none';
    const wrap = document.getElementById('ticketWrap');
    wrap.classList.add('visible');
    wrap.style.display = 'block';

    // ダウンロードセクション更新
    updateDownloadSection();

    // カルーセルのスクロール位置を監視
    setTimeout(() => {
      const container = document.getElementById('ticketsContainer');
      const updateMask = () => {
        const isAtStart = container.scrollLeft < 10;
        const isAtEnd = container.scrollLeft >= container.scrollWidth - container.clientWidth - 10;
        
        container.classList.remove('at-start', 'at-end', 'at-both');
        if (isAtStart && isAtEnd) {
          container.classList.add('at-both');
        } else if (isAtStart) {
          container.classList.add('at-start');
        } else if (isAtEnd) {
          container.classList.add('at-end');
        }
      };
      
      container.addEventListener('scroll', updateMask);
      updateMask();
    }, 100);
  }

function issueTicket() {
  const total = counts.adult + counts.middle + counts.child;

  if (total === 0) {
    alert('1枚以上選択してください。');
    return;
  }

  const now = new Date();

  const dateStr = now.toLocaleString('ja-JP', {
    year: '2-digit',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });

  const nickname = '';

  for (let t = 0; t < counts.adult; t++) {
    tickets.push({
      type: 'adult',
      id: generateId(),
      issued: now.getTime(),
      issuedAt: dateStr,
      admitted: false,
      nickname
    });
  }

  for (let t = 0; t < counts.middle; t++) {
    tickets.push({
      type: 'middle',
      id: generateId(),
      issued: now.getTime(),
      issuedAt: dateStr,
      admitted: false,
      nickname
    });
  }

  for (let t = 0; t < counts.child; t++) {
    tickets.push({
      type: 'child',
      id: generateId(),
      issued: now.getTime(),
      issuedAt: dateStr,
      admitted: false,
      nickname
    });
  }

  counts.adult = 0;
  counts.middle = 0;
  counts.child = 0;

  document.getElementById('countAdult').textContent = '0';
  document.getElementById('countMiddle').textContent = '0';
  document.getElementById('countChild').textContent = '0';
  document.getElementById('totalCount').textContent = '0';

  saveTickets();
  displayTickets();
}

  function deleteTicket(ticketId) {
    if (!confirm('このチケットを削除しますか？')) return;
    tickets = tickets.filter(t => t.id !== ticketId);
    saveTickets();
    
    displayTickets();
  }

  function showTickets() {
    if (tickets.length === 0) {
      alert('発券済みのチケットはありません。');
      return;
    }
    displayTickets();
  }
    
function editNickname(ticketId) {
  const ticket = tickets.find(t => t.id === ticketId);
  if (!ticket) return;

  const newNickname = prompt(
    'ニックネームを入力',
    ticket.nickname || ''
  );

  if (newNickname === null) return;

  const trimmed = newNickname.trim().substring(0, 15);

  ticket.nickname = trimmed;
  saveTickets();

  const nicknameElement =
    document.getElementById('nickname-' + ticketId);

  if (nicknameElement) {
    nicknameElement.textContent =
      trimmed || 'タップして編集';
  }
}

  function goBack() {
    counts.adult = 0;
    counts.middle = 0;
    counts.child = 0;
    document.getElementById('countAdult').textContent = '0';
    document.getElementById('countMiddle').textContent = '0';
    document.getElementById('countChild').textContent = '0';
    document.getElementById('totalCount').textContent = '0';

    // 存在しない要素「nicknameInput」へのアクセスを削除してエラーを解消

    document.getElementById('formCard').style.display = 'block';
    document.getElementById('ticketWrap').classList.remove('visible');
    document.getElementById('ticketWrap').style.display = 'none';
  }

  // 定期的にステータスをチェック
  async function checkAdmittedStatus() {
    try {
      const response = await fetch('https://script.google.com/macros/s/AKfycby6V_PVtyvAWwBrn9bGuCZDwEqiuEJACaji0siv2dzipW7bGvqYDou4xnMQv4wZVH_2dw/exec');
      const admittedIds = await response.json();

      admittedIds.forEach(id => {
        const overlay = document.getElementById('admitted-' + id);
        if (overlay) overlay.classList.add('visible');
      });
    } catch (e) {
      console.error('同期失敗:', e);
    }
  }

  checkAdmittedStatus();
  setInterval(checkAdmittedStatus, 5000);

  function updateDownloadSection() {
    const section = document.getElementById('downloadSection');
    if (!section) return;
    if (tickets.length === 0) { section.innerHTML = ''; return; }
    section.innerHTML = '';
  }

  // SVG imgをPNG dataURLに変換する
  function svgImgToPng(imgEl) {
    return new Promise((resolve) => {
      const src = imgEl.src;
      if (!src.startsWith('data:image/svg')) { resolve(null); return; }
      const canvas = document.createElement('canvas');
      const scale = 3;
      const w = imgEl.offsetWidth || imgEl.naturalWidth || 260;
      const h = imgEl.offsetHeight || imgEl.naturalHeight || 76;
      canvas.width = w * scale;
      canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  // チケット内のSVG imgを一時的にPNGに差し替え、元に戻す関数を返す
  async function replaceSvgWithPng(el) {
    const svgImgs = Array.from(el.querySelectorAll('img[src^="data:image/svg"]'));
    const origSrcs = svgImgs.map(img => img.src);
    for (let i = 0; i < svgImgs.length; i++) {
      const png = await svgImgToPng(svgImgs[i]);
      if (png) svgImgs[i].src = png;
    }
    return () => { svgImgs.forEach((img, i) => { img.src = origSrcs[i]; }); };
  }

  async function downloadTicketById(ticketId) {
    const el = document.getElementById('ticket-el-' + ticketId);
    if (!el) { alert('チケットが見つかりません'); return; }
    const btn = document.querySelector('[onclick="downloadTicketById(\'' + ticketId + '\')"]');
    const origText = btn ? btn.textContent : '';
    if (btn) btn.textContent = '保存中...';
    const deleteBtn = el.querySelector('.ticket-delete-btn');
    const prevDisplay = deleteBtn ? deleteBtn.style.display : '';
    if (deleteBtn) deleteBtn.style.display = 'none';
    const restoreSvg = await replaceSvgWithPng(el);
    try {
      await new Promise(r => requestAnimationFrame(r));
      const canvas = await html2canvas(el, {
        scale: 4,
        backgroundColor: null,
        useCORS: true,
        allowTaint: true,
        width: el.offsetWidth,
        height: el.offsetHeight,
        scrollX: 0,
        scrollY: 0,
        onclone: (doc, clonedEl) => {
          // ① SVG のインラインHTMLを文字列置換でclipPath IDをユニーク化
          //    （複数チケット表示時に同IDが競合してロゴが消える問題を解消）
          const svgEls = clonedEl.querySelectorAll('svg.ticket-logo-svg');
          svgEls.forEach((svg, si) => {
            const prefix = 'tku' + ticketId.replace(/[^a-z0-9]/gi,'') + si;
            let html = svg.outerHTML;
            // SVG内のすべての id="..." を prefix付きに置換
            const idMatches = [...html.matchAll(/\sid="([^"]+)"/g)];
            const idList = [...new Set(idMatches.map(m => m[1]))];
            idList.forEach(oldId => {
              const newId = prefix + '_' + oldId;
              // id="..." の置換
              html = html.replace(new RegExp('id="' + oldId + '"', 'g'), 'id="' + newId + '"');
              // url(#...) 参照の置換
              html = html.replace(new RegExp('url\\(#' + oldId + '\\)', 'g'), 'url(#' + newId + ')');
            });
            const wrapper = doc.createElement('div');
            wrapper.innerHTML = html;
            const newSvg = wrapper.firstChild;
            if (newSvg) svg.parentNode.replaceChild(newSvg, svg);
          });

          // ② ticket-header の overflow を visible にして波形SVGを確実に描画
          const header = clonedEl.querySelector('.ticket-header');
          if (header) {
            header.style.overflow = 'visible';
            header.style.paddingBottom = '22px';
            const wave = header.querySelector('.ticket-header-wave');
            if (wave) {
              wave.style.position = 'absolute';
              wave.style.bottom = '-1px';
              wave.style.left = '0';
              wave.style.width = '100%';
              wave.style.height = '22px';
              wave.style.display = 'block';
            }
          }

          // ③ ticket-divider の repeating-linear-gradient を border に差し替え
          //    （html2canvasがrepeating-linear-gradientを正しく描画しないため）
          const dividers = clonedEl.querySelectorAll('.ticket-divider');
          dividers.forEach(d => {
            d.style.background = 'none';
            d.style.borderTop = '1.5px dashed rgba(26,26,46,0.22)';
            d.style.height = '0';
            d.style.margin = '1rem 0';
          });
        }
      });
      const link = document.createElement('a');
      link.download = 'ticket-' + ticketId + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('保存に失敗しました: ' + e.message);
    }
    restoreSvg();
    if (deleteBtn) deleteBtn.style.display = prevDisplay;
    if (btn) btn.textContent = origText;
  }

  async function downloadAllTickets() { return; }

</script>

<script>

    alert('チケットが見つかりません');

  const canvas = await html2canvas(target, {

}

// ボトムナビのアクティブ状態の自動設定
function setActiveNav() {
  const currentFile = location.pathname.split('/').pop() || 'index.html';
  const navItems = document.querySelectorAll('.nav-item');

  navItems.forEach(item => {
    const itemFile = (item.getAttribute('href') || '').split('/').pop();
    const isActive =
      itemFile === currentFile ||
      (currentFile === '' && itemFile === 'index.html');

    if (isActive) {
      item.classList.add('active');
      item.setAttribute('aria-current', 'page');
    } else {
      item.classList.remove('active');
      item.removeAttribute('aria-current');
    }
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', setActiveNav);
} else {
  setActiveNav();
}
</script>
