<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>イベント予約 - W2MC App</title>
<meta name="description" content="W2MC App — イベント予約。人気の公演やショーの特別指定席をアプリから簡単に予約できます。">

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* =============================================
   デザイントークン (ダーク/マジック)
============================================= */
:root {
  --dark-navy:    #0a1628;
  --deep-blue:    #0d2247;
  --primary-blue: #004aad;
  --bright-cyan:  #0cc0df;
  --light-cyan:   #1eabf9;
  --accent-purple:#5251c2;
  --accent-green: #17fd48;

  --glass-bg:     rgba(13, 34, 71, 0.65);
  --glass-border: rgba(12, 192, 223, 0.25);
  --glass-shine:  rgba(255, 255, 255, 0.05);

  --text:         #f8f4ee;
  --text-muted:   rgba(248, 244, 238, 0.65);
  --text-light:   rgba(248, 244, 238, 0.45);

  --shadow-sm:  0 4px 16px rgba(0, 74, 173, 0.15);
  --shadow-md:  0 8px 32px rgba(0, 74, 173, 0.25);
  --shadow-lg:  0 16px 48px rgba(0, 0, 0, 0.45);
  --shadow-nav: 0 -4px 24px rgba(0, 74, 173, 0.18), 0 8px 32px rgba(0, 0, 0, 0.4);

  --radius-sm:  16px;
  --radius-md:  24px;
  --radius-lg:  32px;
  --radius-full: 999px;

  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* =============================================
   リセット & ベース
============================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Noto Serif JP', 'Georgia', serif;
  background: linear-gradient(135deg, var(--dark-navy) 0%, var(--deep-blue) 50%, var(--primary-blue) 100%);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(110px + env(safe-area-inset-bottom));
  overflow-x: hidden;
}

/* キラキラ背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(12,192,223,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(30,171,249,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 75%, rgba(82,81,194,0.4) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 20px;
}

/* =============================================
   ロゴ & ヘッダー
============================================= */
.logo {
  text-align: center;
  margin-top: 10px;
  margin-bottom: 28px;
}

.logo img {
  width: 200px;
  filter: drop-shadow(0 4px 15px rgba(12, 192, 223, 0.4));
}

.logo p {
  margin-top: 4px;
  color: var(--bright-cyan);
  font-family: 'Roboto', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

/* =============================================
   ページ切替 & アニメーション
============================================= */
.page {
  display: none;
  animation: pageFadeIn 0.45s var(--ease-smooth) both;
}

.page.active {
  display: block;
}

@keyframes pageFadeIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 16px;
  letter-spacing: 0.04em;
  color: var(--text);
  border-left: 3px solid var(--bright-cyan);
  padding-left: 10px;
}

/* =============================================
   イベントカード & 要素
============================================= */
.event-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-shine);
  transition: transform 0.22s var(--ease-bounce), box-shadow 0.22s;
}

.event-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.event-image {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-bottom: 1px solid var(--glass-border);
}

.event-body {
  padding: 20px;
}

.event-title {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 8px;
  color: var(--text);
}

.event-desc {
  font-family: sans-serif;
  color: var(--text-muted);
  line-height: 1.6;
  font-size: 13.5px;
}

.event-time {
  margin-top: 14px;
  font-family: 'Roboto', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--bright-cyan);
  display: flex;
  align-items: center;
  gap: 6px;
}

.button {
  width: 100%;
  border: none;
  border-radius: var(--radius-md);
  padding: 15px;
  margin-top: 18px;
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.08em;
  transition: transform 0.2s var(--ease-bounce), box-shadow 0.2s;
  background: linear-gradient(135deg, var(--bright-cyan) 0%, var(--light-cyan) 100%);
  color: var(--dark-navy);
  box-shadow: 0 4px 15px rgba(12, 192, 223, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(12, 192, 223, 0.4);
}

.button:active {
  transform: scale(0.97) translateY(0);
}

.back-button {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--text);
  margin-bottom: 20px;
  margin-top: 0;
  box-shadow: none;
  padding: 10px 16px;
  font-size: 13px;
  border-radius: var(--radius-sm);
  display: inline-flex;
  width: auto;
  align-self: flex-start;
}
.back-button:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: none;
}

.detail-image {
  width: 100%;
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  height: 220px;
  object-fit: cover;
  border: 1px solid var(--glass-border);
}

.detail-text {
  font-family: sans-serif;
  line-height: 1.8;
  color: var(--text-muted);
  margin-top: 14px;
  font-size: 14px;
}

.info-box {
  margin-top: 22px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: var(--radius-md);
  padding: 20px;
  border: 1px solid var(--glass-border);
}

.info-item {
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.info-item:last-child {
  margin-bottom: 0;
}

.info-label {
  color: var(--bright-cyan);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.info-val-text {
  font-size: 14px;
  color: var(--text);
}

.ticket-select {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.ticket-card {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid transparent;
  border-radius: var(--radius-md);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.22s, background 0.22s, transform 0.2s var(--ease-bounce);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ticket-card:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateY(-1px);
}

.ticket-card.active {
  border-color: var(--bright-cyan);
  background: rgba(12, 192, 223, 0.12);
  box-shadow: 0 0 15px rgba(12, 192, 223, 0.2);
}

.ticket-type {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.ticket-id {
  font-family: 'Roboto', sans-serif;
  color: var(--text-muted);
  font-size: 13px;
  letter-spacing: 0.04em;
}

.complete-card {
  text-align: center;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  box-shadow: var(--shadow-lg);
  animation: cardFadeUp 0.5s var(--ease-smooth);
}

.complete-icon {
  font-size: 50px;
  margin-bottom: 14px;
  animation: bounceScale 0.6s var(--ease-bounce) both;
}

@keyframes bounceScale {
  from { transform: scale(0.3); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.complete-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 12px;
  color: var(--text);
}

.reservation-number {
  margin-top: 18px;
  font-family: 'Roboto', sans-serif;
  color: var(--bright-cyan);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: rgba(12, 192, 223, 0.1);
  padding: 8px 16px;
  border-radius: var(--radius-full);
  display: inline-block;
}

.reservation-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 14px;
}

.reservation-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.reservation-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--bright-cyan);
}

.reservation-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 8px;
  color: var(--text);
}

.small {
  font-family: sans-serif;
  color: var(--text-muted);
  font-size: 12.5px;
  line-height: 1.6;
}

.small span {
  font-family: 'Roboto', sans-serif;
  color: var(--bright-cyan);
  font-weight: 700;
}

.empty {
  text-align: center;
  color: var(--text-light);
  padding: 48px 24px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px dashed var(--glass-border);
  border-radius: var(--radius-md);
}

/* =============================================
   ボトムナビゲーション
============================================= */
.bottom-nav {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: calc(10px + env(safe-area-inset-bottom));
  z-index: 9999;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border: 1px solid rgba(255, 255, 255, 0.70);
  border-radius: 999px;
  padding: 10px 6px;
  box-shadow: var(--shadow-nav);
  min-height: 68px;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: #6B7C93;
  font-size: 11px;
  font-weight: 500;
  min-width: 56px;
  min-height: 48px;
  border-radius: 24px;
  padding: 6px 8px;
  transition: color 0.2s, background 0.2s, transform 0.18s var(--ease-bounce);
  position: relative;
}

.nav-item:hover {
  background: rgba(116,169,216,0.08);
  transform: translateY(-2px);
}
.nav-item:active { transform: scale(0.90); }

.nav-icon {
  font-size: 20px;
  margin-bottom: 3px;
  transition: transform 0.18s var(--ease-bounce);
}
.nav-item:hover .nav-icon { transform: scale(1.15); }

.nav-item.active {
  color: #3A6FA0;
  font-weight: 700;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px;
  background: linear-gradient(90deg, #5B90C2, #74A9D8);
  border-radius: 999px;
  animation: navIndicator 0.3s var(--ease-bounce);
}
@keyframes navIndicator {
  from { width: 0; opacity: 0; }
  to   { width: 28px; opacity: 1; }
}

::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>

<body>

  <div class="app">
    
    <header class="logo">
      <img src="Whatwecall.svg" alt="W2MC App" />
      <p>Official Event App</p>
    </header>

    <!-- 1. イベント一覧 -->
    <div class="page active" id="eventListPage">
      <h2 class="section-title">イベント一覧</h2>
      <div id="eventList"></div>
      <button class="button" onclick="openReservationsPage()">
        <span>📅</span> 予約済みイベントを見る
      </button>
    </div>

    <!-- 2. 詳細 -->
    <div class="page" id="eventDetailPage">
      <button class="back-button" onclick="showPage('eventListPage')">
        ← 一覧へ戻る
      </button>
      <img id="detailImage" class="detail-image" alt="イベントイメージ" />
      <h2 id="detailTitle" class="section-title">イベントタイトル</h2>
      <div id="detailDescription" class="detail-text"></div>
      
      <div class="info-box">
        <div class="info-item">
          <div class="info-label">実施日時</div>
          <div id="detailDate" class="info-val-text"></div>
        </div>
        <div class="info-item">
          <div class="info-label">所要時間</div>
          <div id="detailDuration" class="info-val-text"></div>
        </div>
        <div class="info-item">
          <div class="info-label">注意事項</div>
          <div id="detailNotes" class="info-val-text"></div>
        </div>
      </div>

      <button class="button" onclick="openReservationPage()">
        <span>✍️</span> 予約へ進む
      </button>
    </div>

    <!-- 3. 予約確認 -->
    <div class="page" id="reservationPage">
      <button class="back-button" onclick="showPage('eventDetailPage')">
        ← 詳細へ戻る
      </button>
      <h2 class="section-title">予約手続き</h2>
      
      <div class="info-box" style="margin-bottom: 20px;">
        <div class="info-item">
          <div class="info-label">予約イベント</div>
          <div id="reserveEventTitle" class="info-val-text" style="font-weight: 700;"></div>
        </div>
        <div class="info-item">
          <div class="info-label">日時</div>
          <div id="reserveEventDate" class="info-val-text"></div>
        </div>
      </div>

      <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">使用するチケットを選択</h3>
      <div class="ticket-select" id="ticketList"></div>

      <button class="button" onclick="confirmReservation()">
        <span>確定</span> 予約を確定する
      </button>
    </div>

    <!-- 4. 完了 -->
    <div class="page" id="completePage">
      <div class="complete-card">
        <div class="complete-icon" aria-hidden="true">✨</div>
        <div class="complete-title">予約が完了しました</div>
        <div id="completeEventName" style="font-weight: 700; margin-bottom: 12px;"></div>
        <div class="reservation-number" id="reservationNumber">RES-XXXX</div>
        
        <button class="button" onclick="openReservationsPage()">
          <span>📅</span> 予約一覧を見る
        </button>
      </div>
    </div>

    <!-- 5. 予約一覧 -->
    <div class="page" id="reservationsPage">
      <button class="back-button" onclick="showPage('eventListPage')">
        ← イベント一覧へ
      </button>
      <h2 class="section-title">予約済みイベント</h2>
      <div id="reservationsList" class="reservation-list"></div>
    </div>

  </div>

  <!-- ボトムナビゲーション -->
  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <a href="index.html" class="nav-item" data-page="index">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span>Home</span>
    </a>
    <a href="map.html" class="nav-item" data-page="map">
      <span class="nav-icon" aria-hidden="true">🗺️</span>
      <span>Map</span>
    </a>
    <a href="ticket.get.html" class="nav-item" data-page="ticket">
      <span class="nav-icon" aria-hidden="true">🎟️</span>
      <span>Ticket</span>
    </a>
    <a href="saved.html" class="nav-item" data-page="saved">
      <span class="nav-icon" aria-hidden="true">⭐</span>
      <span>Saved</span>
    </a>
    <a href="my.html" class="nav-item" data-page="my">
      <span class="nav-icon" aria-hidden="true">👤</span>
      <span>My</span>
    </a>
  </nav>

  <script>
    const STORAGE_KEY = 'wwcm_tickets';
    const RESERVATION_KEY = 'wwcm_reservations';
    const GAS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';

    const events = [
      {
        id: 'event_001',
        title: 'Fantasmic Night',
        shortDesc: '夜の水上ショーを特別観覧席で体験',
        description: '巨大なハーバーを舞台に、光・炎・噴水・音楽が融合するナイトスペクタクル。限定エリアからゆったり鑑賞できます。',
        date: '2026/06/10',
        time: '19:30',
        duration: '約40分',
        notes: '途中退出不可',
        image: 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1200&auto=format&fit=crop'
      },
      {
        id: 'event_002',
        title: 'Harbor Greeting',
        shortDesc: 'キャラクターによる期間限定グリーティング',
        description: 'キャラクターたちがハーバーを巡るスペシャルグリーティングイベント。',
        date: '2026/06/12',
        time: '15:00',
        duration: '約25分',
        notes: '雨天時内容変更',
        image: 'https://images.unsplash.com/photo-1505236858219-8359eb29e329?q=80&w=1200&auto=format&fit=crop'
      },
      {
        id: 'event_003',
        title: 'Magical Orchestra',
        shortDesc: '生演奏によるプレミアム音楽体験',
        description: 'テーマパーク楽曲を中心に構成されたナイトオーケストラ公演。',
        date: '2026/06/18',
        time: '20:00',
        duration: '約55分',
        notes: '全席指定',
        image: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop'
      }
    ];

    let selectedEvent = null;
    let selectedTicketId = null;

    function showPage(id) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // イベント一覧レンダリング
    function renderEvents() {
      const container = document.getElementById('eventList');
      container.innerHTML = '';

      events.forEach(event => {
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = `
          <img class="event-image" src="${event.image}" alt="${event.title}">
          <div class="event-body">
            <div class="event-title">${event.title}</div>
            <div class="event-desc">${event.shortDesc}</div>
            <div class="event-time">
              <span>📅</span> ${event.date} ${event.time}
            </div>
            <button class="button" onclick="openDetail('${event.id}')">
              詳細を見る
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // 詳細表示
    window.openDetail = function(id) {
      selectedEvent = events.find(e => e.id === id);

      document.getElementById('detailImage').src = selectedEvent.image;
      document.getElementById('detailTitle').textContent = selectedEvent.title;
      document.getElementById('detailDescription').textContent = selectedEvent.description;
      document.getElementById('detailDate').textContent = `${selectedEvent.date} ${selectedEvent.time}`;
      document.getElementById('detailDuration').textContent = selectedEvent.duration;
      document.getElementById('detailNotes').textContent = selectedEvent.notes;

      showPage('eventDetailPage');
    };

    // 予約入力画面を開く
    window.openReservationPage = function() {
      let tickets = [];
      try {
        tickets = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (e) {}

      if (tickets.length === 0) {
        alert('先にチケットを取得してください。Ticketタブから発券できます。');
        return;
      }

      document.getElementById('reserveEventTitle').textContent = selectedEvent.title;
      document.getElementById('reserveEventDate').textContent = `${selectedEvent.date} ${selectedEvent.time}`;

      const list = document.getElementById('ticketList');
      list.innerHTML = '';
      selectedTicketId = null; // リセット

      // メインチケットの取得
      let user = {};
      try {
        user = JSON.parse(localStorage.getItem('wwcm_user') || '{}');
      } catch(e) {}

      tickets.forEach(ticket => {
        const typeMap = { adult: '大人', middle: '中人', child: '小人' };
        const label = typeMap[ticket.type] || 'チケット';

        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.onclick = () => selectTicket(ticket.id, card);
        card.innerHTML = `
          <div class="ticket-type">${label}</div>
          <div class="ticket-id">${ticket.id}</div>
        `;
        
        // メインチケットを自動選択、無ければ最初のチケットを選択
        if (user.primaryTicketId === ticket.id) {
          card.classList.add('active');
          selectedTicketId = ticket.id;
        } else if (!user.primaryTicketId && !selectedTicketId) {
          card.classList.add('active');
          selectedTicketId = ticket.id;
        }

        list.appendChild(card);
      });

      showPage('reservationPage');
    };

    function selectTicket(id, element) {
      selectedTicketId = id;
      document.querySelectorAll('.ticket-card').forEach(card => {
        card.classList.remove('active');
      });
      element.classList.add('active');
    }

    // ID生成
    function generateReservationId() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const random = Math.floor(Math.random() * 9000) + 1000;
      return `RES-${y}${m}${d}-${random}`;
    }

    // 予約確定
    window.confirmReservation = async function() {
      if (!selectedTicketId) {
        alert('使用するチケットを選択してください。');
        return;
      }

      let current = [];
      try {
        current = JSON.parse(localStorage.getItem(RESERVATION_KEY) || '[]');
      } catch (e) {}

      // 重複予約の防止
      const isDuplicate = current.some(res => res.eventId === selectedEvent.id && res.ticketId === selectedTicketId);
      if (isDuplicate) {
        alert('このチケットは既にこのイベントを予約済みです。別のチケットを選択するか、マイページで予約状況をご確認ください。');
        return;
      }

      const reservationId = generateReservationId();
      
      // ユーザー情報の取得
      let user = { name: 'ゲスト', email: '' };
      try {
        const stored = localStorage.getItem('wwcm_user');
        if (stored) user = JSON.parse(stored);
      } catch (e) {}

      const reservation = {
        reservationId,
        eventId: selectedEvent.id,
        eventTitle: selectedEvent.title,
        eventDate: selectedEvent.date,
        eventTime: selectedEvent.time,
        ticketId: selectedTicketId,
        reservedAt: new Date().toISOString()
      };

      current.push(reservation);
      localStorage.setItem(RESERVATION_KEY, JSON.stringify(current));

      // GASへの非同期送信 (アクション reserve)
      try {
        if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL' && GAS_URL.startsWith('http')) {
          const payload = {
            action: 'reserve',
            reservationId: reservation.reservationId,
            eventId: reservation.eventId,
            eventTitle: reservation.eventTitle,
            eventDate: reservation.eventDate,
            eventTime: reservation.eventTime,
            ticketId: reservation.ticketId,
            userName: user.name || 'ゲスト',
            email: user.email || ''
          };

          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).catch(err => console.warn('GAS fetch background error:', err));
        }
      } catch (error) {
        console.warn('GAS sync warning:', error);
      }

      document.getElementById('completeEventName').textContent = selectedEvent.title;
      document.getElementById('reservationNumber').textContent = reservationId;

      showPage('completePage');
    };

    // 予約キャンセル処理
    window.cancelReservation = async function(reservationId) {
      if (!confirm('本当にこの予約をキャンセルしますか？')) {
        return;
      }

      let reservations = [];
      try {
        reservations = JSON.parse(localStorage.getItem(RESERVATION_KEY) || '[]');
      } catch (e) {}

      const resToCancel = reservations.find(r => r.reservationId === reservationId);
      if (!resToCancel) return;

      reservations = reservations.filter(r => r.reservationId !== reservationId);
      localStorage.setItem(RESERVATION_KEY, JSON.stringify(reservations));

      // ユーザー情報の取得
      let user = { name: 'ゲスト', email: '' };
      try {
        const stored = localStorage.getItem('wwcm_user');
        if (stored) user = JSON.parse(stored);
      } catch (e) {}

      // GASへの非同期送信 (アクション cancel)
      try {
        if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL' && GAS_URL.startsWith('http')) {
          const payload = {
            action: 'cancel',
            reservationId: resToCancel.reservationId,
            eventId: resToCancel.eventId,
            eventTitle: resToCancel.eventTitle,
            eventDate: resToCancel.eventDate,
            eventTime: resToCancel.eventTime,
            ticketId: resToCancel.ticketId,
            userName: user.name || 'ゲスト',
            email: user.email || ''
          };

          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).catch(err => console.warn('GAS fetch background error:', err));
        }
      } catch (error) {
        console.warn('GAS sync warning:', error);
      }

      alert('予約をキャンセルしました。');
      openReservationsPage();
    };

    // 予約済みリスト表示
    window.openReservationsPage = function() {
      let reservations = [];
      try {
        reservations = JSON.parse(localStorage.getItem(RESERVATION_KEY) || '[]');
      } catch (e) {}

      const list = document.getElementById('reservationsList');

      if (reservations.length === 0) {
        list.innerHTML = `
          <div class="empty">予約済みのイベントはありません</div>
        `;
        showPage('reservationsPage');
        return;
      }

      list.innerHTML = '';
      // 新しい予約が上に来るようにリバース
      reservations.slice().reverse().forEach(item => {
        const card = document.createElement('div');
        card.className = 'reservation-card';
        card.innerHTML = `
          <div class="reservation-title">${item.eventTitle}</div>
          <div class="small" style="margin-bottom: 12px;">
            日時: <span>${item.eventDate} ${item.eventTime}</span><br>
            チケット番号: <span>${item.ticketId}</span><br>
            予約管理番号: <span>${item.reservationId}</span>
          </div>
          <button class="cancel-btn" onclick="cancelReservation('${item.reservationId}')" style="
            background: rgba(255, 74, 74, 0.12);
            color: #ff4d4d;
            border: 1px solid rgba(255, 74, 74, 0.3);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            font-size: 12.5px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 4px;
          ">
            ✕ この予約をキャンセルする
          </button>
        `;
        list.appendChild(card);
      });

      showPage('reservationsPage');
    };

    // ボトムナビのアクティブ状態の自動設定
    function setActiveNav() {
      const currentFile = location.pathname.split('/').pop() || 'index.html';
      const navItems = document.querySelectorAll('.nav-item');

      navItems.forEach(item => {
        const itemFile = (item.getAttribute('href') || '').split('/').pop();
        const isActive =
          itemFile === currentFile ||
          (currentFile === '' && itemFile === 'index.html');

        if (isActive) {
          item.classList.add('active');
          item.setAttribute('aria-current', 'page');
        } else {
          item.classList.remove('active');
          item.removeAttribute('aria-current');
        }
      });
    }

    // URLパラメータのチェック（一覧表示対応）
    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('view') === 'list') {
        openReservationsPage();
      }
    });

    renderEvents();
    setActiveNav();
  </script>

</body>
</html>
