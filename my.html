<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>My Page</title>

<style>
:root{
    --blue:#4E88BC;
    --deep-blue:#356B9C;
    --beige:#F6EEE4;
    --card:rgba(255,255,255,.82);
    --text:#314255;
    --shadow:0 10px 28px rgba(60,80,100,.14);
    --radius:30px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    min-height:100%;
}

body{
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        sans-serif;

    color:var(--text);

    background:
        radial-gradient(
            circle at top left,
            rgba(255,255,255,.7),
            transparent 34%
        ),
        linear-gradient(
            180deg,
            #edf7ff 0%,
            #f7efe3 100%
        );

    padding-bottom:
    calc(120px + env(safe-area-inset-bottom));
}

/* Header */

.hero{
    position:relative;
    overflow:hidden;

    background:
        linear-gradient(
            180deg,
            #4E88BC 0%,
            #72B0DD 48%,
            #BFDDF2 100%
        );

    padding:
        calc(env(safe-area-inset-top) + 26px)
        22px
        90px;
}

.logo{
    width:170px;
}

.page-title{
    color:white;
    margin-top:14px;
    font-size:28px;
    font-weight:700;
}

.wave{
    position:absolute;
    left:0;
    bottom:-1px;
    width:100%;
    height:90px;
}

/* Content */

.content{
    margin-top:-44px;
    padding:0 18px;
    position:relative;
    z-index:10;
}

.card{
    background:var(--card);
    backdrop-filter:blur(16px);

    border-radius:30px;
    padding:22px;

    margin-bottom:16px;
    box-shadow:var(--shadow);
}

.card-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:16px;
}

.ticket-number{
    font-size:28px;
    font-weight:800;
    color:var(--deep-blue);
}

.sub{
    margin-top:6px;
    color:#6d7b88;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid rgba(0,0,0,.06);
}

.row:last-child{
    border-bottom:none;
}

.label{
    color:#6d7b88;
}

.value{
    font-weight:700;
}

.reservation{
    background:white;
    border-radius:24px;
    padding:18px;
    margin-bottom:12px;
}

.time{
    font-size:14px;
    color:#6d7b88;
}

.event{
    font-size:20px;
    font-weight:700;
    margin-top:6px;
}

.place{
    color:#6d7b88;
    margin-top:4px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.stat{
    background:white;
    border-radius:24px;
    padding:20px 14px;
    text-align:center;
}

.stat-num{
    font-size:28px;
    font-weight:800;
    color:var(--deep-blue);
}

.stat-label{
    font-size:13px;
    margin-top:6px;
    color:#6d7b88;
}

/* bottom nav */

.bottom-nav{
    position:fixed;

    left:14px;
    right:14px;

    bottom:
        calc(12px + env(safe-area-inset-bottom));

    z-index:9999;

    display:flex;
    justify-content:space-around;
    align-items:center;

    background:
        rgba(255,255,255,.88);

    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);

    border-radius:999px;

    padding:14px 10px;

    box-shadow:
        0 10px 35px rgba(0,0,0,.16);

    min-height:74px;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;

    text-decoration:none;
    color:#6d7b88;

    font-size:12px;
    min-width:58px;
}

.nav-icon{
    font-size:22px;
    margin-bottom:4px;
}

.active{
    color:var(--deep-blue);
    font-weight:700;
}
</style>
</head>

<body>

<header class="hero">

    <img
        src="Whatwecall.svg"
        class="logo"
    >

    <div class="page-title">
        My Page
    </div>

    <svg
        class="wave"
        viewBox="0 0 1440 320"
        preserveAspectRatio="none"
    >
        <path
            fill="#F6EEE4"
            d="M0,210
            C180,190
            360,185
            540,198
            C720,212
            900,215
            1080,200
            C1260,185
            1350,188
            1440,195
            L1440,320
            L0,320
            Z">
        </path>
    </svg>

</header>

<main class="content">

    <section class="card">

        <div class="card-title">
            チケット
        </div>

        <div class="ticket-number">
            HG26-01382
        </div>

        <div class="sub">
            入場人数：2名
        </div>

    </section>

    <section class="card">

        <div class="card-title">
            次の予約
        </div>

        <div class="reservation">
            <div class="time">
                13:00〜
            </div>

            <div class="event">
                演劇部公演
            </div>

            <div class="place">
                体育館
            </div>
        </div>

    </section>

    <section class="card">

        <div class="card-title">
            予約一覧
        </div>

        <div class="reservation">
            <div class="time">13:00〜</div>
            <div class="event">演劇部公演</div>
            <div class="place">体育館</div>
        </div>

        <div class="reservation">
            <div class="time">14:20〜</div>
            <div class="event">軽音ライブ</div>
            <div class="place">講堂</div>
        </div>

    </section>

    <section class="card">

        <div class="card-title">
            アクティビティ
        </div>

        <div class="stats">

            <div class="stat">
                <div class="stat-num">
                    5
                </div>
                <div class="stat-label">
                    スタンプ
                </div>
            </div>

            <div class="stat">
                <div class="stat-num">
                    8
                </div>
                <div class="stat-label">
                    いいね
                </div>
            </div>

            <div class="stat">
                <div class="stat-num">
                    2
                </div>
                <div class="stat-label">
                    予約
                </div>
            </div>

        </div>

    </section>

    <section class="card">

        <div class="card-title">
            登録情報
        </div>

        <div class="row">
            <div class="label">
                アカウント名
            </div>

            <div class="value">
                Guest
            </div>
        </div>

        <div class="row">
            <div class="label">
                通知
            </div>

            <div class="value">
                ON
            </div>
        </div>

    </section>

</main>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span>
        Home
    </a>

    <a href="map.html" class="nav-item">
        <span class="nav-icon">🗺️</span>
        Map
    </a>

    <a href="ticket.get.html" class="nav-item">
        <span class="nav-icon">🎟️</span>
        Ticket
    </a>

    <a href="#" class="nav-item">
        <span class="nav-icon">⭐</span>
        Saved
    </a>

    <a href="my.html" class="nav-item active">
        <span class="nav-icon">👤</span>
        My
    </a>

</nav>

</body>
</html>
``
