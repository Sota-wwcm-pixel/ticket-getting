<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>お気に入り - W2MC App</title>
<meta name="description" content="W2MC App — お気に入りページ。いいねした展示やブックマークしたイベントを一覧で確認できます。">

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* =============================================
   デザイントークン
============================================= */
:root {
  --blue:       #74A9D8;
  --deep-blue:  #3A6FA0;
  --mid-blue:   #5B90C2;
  --sky:        #A9D2F3;
  --light-sky:  #D6EDFB;
  --beige:      #F6EEE4;
  --cream:      #FFF9F2;
  --warm-gold:  #E8C97A;
  --text:         #243447;
  --text-muted:   #6B7C93;
  --text-light:   #94A8BC;

  --glass-bg:     rgba(255, 255, 255, 0.72);
  --glass-border: rgba(255, 255, 255, 0.65);
  --glass-shine:  rgba(255, 255, 255, 0.90);

  --shadow-sm:  0 4px 16px rgba(58, 111, 160, 0.10);
  --shadow-md:  0 8px 32px rgba(58, 111, 160, 0.14);
  --shadow-lg:  0 16px 48px rgba(58, 111, 160, 0.20);
  --shadow-nav: 0 -4px 24px rgba(58, 111, 160, 0.12), 0 8px 32px rgba(0, 0, 0, 0.14);

  --radius-sm:  16px;
  --radius-md:  24px;
  --radius-lg:  32px;
  --radius-full: 999px;

  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* =============================================
   リセット & ベース
============================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  color: var(--text);
  background:
    radial-gradient(ellipse at 10% 0%, rgba(116, 169, 216, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 10%, rgba(232, 201, 122, 0.10) 0%, transparent 45%),
    linear-gradient(170deg, #EBF5FF 0%, #F4EDE3 100%);
  min-height: 100vh;
  padding-bottom: calc(100px + env(safe-area-inset-bottom));
}

/* =============================================
   ヘッダー / ヒーロー
============================================= */
.hero {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.22) 0%, transparent 55%),
    linear-gradient(155deg, #3A6FA0 0%, #5B90C2 48%, #82BAE0 100%);
  padding:
    calc(env(safe-area-inset-top) + 26px)
    22px
    80px;
}

.hero-deco {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-circle {
  position: absolute;
  border-radius: 50%;
  background: white;
  opacity: 0.1;
  animation: float 6s ease-in-out infinite alternate;
}
.hero-circle-1 { width: 140px; height: 140px; top: -20px; right: -20px; }
.hero-circle-2 { width: 80px; height: 80px; bottom: 10px; left: -20px; animation-delay: -2s; }

@keyframes float {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-10px) scale(1.05); }
}

.logo {
  width: 150px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}

.page-title {
  color: white;
  margin-top: 14px;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 0.02em;
}

.wave {
  position: absolute;
  left: 0;
  bottom: -1px;
  width: 100%;
  height: 60px;
}

/* =============================================
   コンテンツ
============================================= */
.content {
  margin-top: -36px;
  padding: 0 16px;
  position: relative;
  z-index: 10;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  margin: 16px 4px 12px;
  color: var(--text);
}

.saved-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm), inset 0 1px 0 var(--glass-shine);
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: transform 0.22s var(--ease-bounce), box-shadow 0.22s;
  animation: cardFadeUp 0.4s var(--ease-smooth) both;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}

@keyframes cardFadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-icon-wrap {
  width: 48px; height: 48px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--sky) 0%, var(--blue) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 10px rgba(116, 169, 216, 0.25);
  flex-shrink: 0;
}

.card-info {
  flex: 1;
  min-width: 0;
}

.card-title-text {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-subtitle {
  font-size: 12px;
  color: var(--text-muted);
}

.card-action-btn {
  background: rgba(224, 90, 115, 0.1);
  border: none;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #e05a73;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s var(--ease-bounce);
}
.card-action-btn:hover {
  background: rgba(224, 90, 115, 0.18);
  transform: scale(1.1);
}
.card-action-btn:active {
  transform: scale(0.9);
}

/* 空ステート */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  animation: cardFadeUp 0.5s var(--ease-smooth);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  display: block;
}

.empty-text {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
}

.empty-subtext {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 20px;
}

.btn-primary {
  display: inline-block;
  background: linear-gradient(135deg, var(--mid-blue) 0%, var(--deep-blue) 100%);
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: var(--radius-full);
  box-shadow: 0 4px 12px rgba(58, 111, 160, 0.25);
  transition: transform 0.2s var(--ease-bounce), box-shadow 0.2s;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(58, 111, 160, 0.35);
}
.btn-primary:active { transform: translateY(0); }

/* =============================================
   ボトムナビゲーション
============================================= */
.bottom-nav {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: calc(10px + env(safe-area-inset-bottom));
  z-index: 9999;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border: 1px solid rgba(255, 255, 255, 0.70);
  border-radius: var(--radius-full);
  padding: 10px 6px;
  box-shadow: var(--shadow-nav);
  min-height: 68px;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  min-width: 56px;
  min-height: 48px;
  border-radius: var(--radius-md);
  padding: 6px 8px;
  transition: color 0.2s, background 0.2s, transform 0.18s var(--ease-bounce);
  position: relative;
}

.nav-item:hover {
  background: rgba(116,169,216,0.08);
  transform: translateY(-2px);
}
.nav-item:active { transform: scale(0.90); }

.nav-icon {
  font-size: 20px;
  margin-bottom: 3px;
  transition: transform 0.18s var(--ease-bounce);
}
.nav-item:hover .nav-icon { transform: scale(1.15); }

.nav-item.active {
  color: var(--deep-blue);
  font-weight: 700;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px;
  background: linear-gradient(90deg, var(--mid-blue), var(--blue));
  border-radius: var(--radius-full);
  animation: navIndicator 0.3s var(--ease-bounce);
}
@keyframes navIndicator {
  from { width: 0; opacity: 0; }
  to   { width: 28px; opacity: 1; }
}

::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>

<body>

  <header class="hero">
    <div class="hero-deco" aria-hidden="true">
      <div class="hero-circle hero-circle-1"></div>
      <div class="hero-circle hero-circle-2"></div>
    </div>
    <img src="Whatwecall.svg" alt="What we call Magic!" class="logo" />
    <h1 class="page-title">Saved</h1>
    
    <svg class="wave" viewBox="0 0 1440 110" preserveAspectRatio="none" aria-hidden="true">
      <path fill="#EBF5FF" d="M0,60 C240,90 480,30 720,55 C960,80 1200,20 1440,50 L1440,110 L0,110 Z" />
      <path fill="#F4EDE3" opacity="0.55" d="M0,75 C200,95 440,50 720,68 C1000,86 1240,40 1440,62 L1440,110 L0,110 Z" />
    </svg>
  </header>

  <main class="content">
    <h2 class="section-title">お気に入りリスト</h2>
    
    <div id="savedContainer">
      <!-- JSで動的に表示 -->
    </div>
  </main>

  <!-- ボトムナビゲーション -->
  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <a href="index.html" class="nav-item" data-page="index">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span>Home</span>
    </a>
    <a href="map.html" class="nav-item" data-page="map">
      <span class="nav-icon" aria-hidden="true">🗺️</span>
      <span>Map</span>
    </a>
    <a href="ticket.get.html" class="nav-item" data-page="ticket">
      <span class="nav-icon" aria-hidden="true">🎟️</span>
      <span>Ticket</span>
    </a>
    <a href="saved.html" class="nav-item" data-page="saved">
      <span class="nav-icon" aria-hidden="true">⭐</span>
      <span>Saved</span>
    </a>
    <a href="my.html" class="nav-item" data-page="my">
      <span class="nav-icon" aria-hidden="true">👤</span>
      <span>My</span>
    </a>
  </nav>

  <script>
    const SAVED_KEY = 'wwcm_saved';

    // 初期化および読み込み
    function loadSavedItems() {
      const container = document.getElementById('savedContainer');
      let saved = [];
      try {
        saved = JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');
      } catch (e) {
        saved = [];
      }

      if (saved.length === 0) {
        // 空の場合のプレースホルダー
        container.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon" aria-hidden="true">⭐</span>
            <div class="empty-text">お気に入りはまだありません</div>
            <div class="empty-subtext">マップや展示一覧から、気になった企画に「いいね」をして保存しよう！</div>
            <a href="map.html" class="btn-primary">展示を探しに行く</a>
          </div>
        `;
        return;
      }

      container.innerHTML = '';
      const listDiv = document.createElement('div');
      listDiv.className = 'saved-list';

      saved.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${index * 0.05}s`;
        
        card.innerHTML = `
          <div class="card-icon-wrap" aria-hidden="true">${item.emoji || '✨'}</div>
          <div class="card-info">
            <div class="card-title-text">${item.name}</div>
            <div class="card-subtitle">${item.place || '校内'}</div>
          </div>
          <button class="card-action-btn" onclick="removeSavedItem('${item.name}')" aria-label="${item.name}をお気に入りから削除">
            ✕
          </button>
        `;
        listDiv.appendChild(card);
      });

      container.appendChild(listDiv);
    }

    // 削除処理
    window.removeSavedItem = function(name) {
      try {
        let saved = JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');
        saved = saved.filter(item => item.name !== name);
        localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
        loadSavedItems();
      } catch (e) {
        console.error(e);
      }
    };

    // ボトムナビのアクティブ状態の自動設定
    function setActiveNav() {
      const currentFile = location.pathname.split('/').pop() || 'index.html';
      const navItems = document.querySelectorAll('.nav-item');

      navItems.forEach(item => {
        const itemFile = (item.getAttribute('href') || '').split('/').pop();
        const isActive =
          itemFile === currentFile ||
          (currentFile === '' && itemFile === 'index.html');

        if (isActive) {
          item.classList.add('active');
          item.setAttribute('aria-current', 'page');
        } else {
          item.classList.remove('active');
          item.removeAttribute('aria-current');
        }
      });
    }

    // テストデータの初期セットアップ（デモ用）
    function setupDemoDataIfEmpty() {
      try {
        const existing = localStorage.getItem(SAVED_KEY);
        if (!existing) {
          const demoData = [
            { name: '演劇部公演「魔法の森」', place: '体育館', emoji: '🎭' },
            { name: 'D研究会展示「VR体験」', place: '3F展示室', emoji: '✨' },
            { name: '軽音ライブ「青空フェス」', place: '講堂', emoji: '🎵' }
          ];
          localStorage.setItem(SAVED_KEY, JSON.stringify(demoData));
        }
      } catch(e) {}
    }

    setupDemoDataIfEmpty();
    loadSavedItems();
    setActiveNav();
  </script>
</body>
</html>
