<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Event Reservation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Serif+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top, #1f4364 0%, #102235 45%, #08131f 100%);
  min-height:100vh;
  color:white;
  font-family:'Noto Serif JP', serif;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.06), transparent 25%),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,.04), transparent 20%);
}

.app{
  position:relative;
  z-index:2;
  width:100%;
  max-width:520px;
  margin:auto;
  padding:24px 18px 120px;
}

.logo{
  text-align:center;
  margin-top:24px;
  margin-bottom:32px;
}

.logo h1{
  font-family:'Playfair Display', serif;
  font-size:38px;
  letter-spacing:.08em;
}

.logo p{
  margin-top:6px;
  opacity:.75;
  font-size:13px;
}

.page{
  display:none;
  animation:fade .35s ease;
}

.page.active{
  display:block;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

.section-title{
  font-size:24px;
  margin-bottom:20px;
  font-weight:700;
}

.event-card{
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:26px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:
    0 10px 30px rgba(0,0,0,.25);
}

.event-image{
  width:100%;
  height:190px;
  object-fit:cover;
}

.event-body{
  padding:22px;
}

.event-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:10px;
}

.event-desc{
  opacity:.82;
  line-height:1.8;
  font-size:14px;
}

.event-time{
  margin-top:18px;
  font-size:14px;
  color:#ffe8a3;
}

.button{
  width:100%;
  border:none;
  border-radius:999px;
  padding:16px;
  margin-top:22px;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
  transition:.25s;
  background:
    linear-gradient(135deg,#ffe7a3,#d7b86b);
  color:#13283d;
}

.button:hover{
  transform:translateY(-2px);
}

.back-button{
  background:rgba(255,255,255,.12);
  color:white;
  margin-bottom:16px;
}

.detail-image{
  width:100%;
  border-radius:28px;
  margin-bottom:22px;
  height:240px;
  object-fit:cover;
}

.detail-text{
  line-height:2;
  opacity:.9;
  margin-top:18px;
  font-size:14px;
}

.info-box{
  margin-top:22px;
  background:rgba(255,255,255,.08);
  border-radius:24px;
  padding:18px;
  border:1px solid rgba(255,255,255,.1);
}

.info-item{
  margin-bottom:14px;
}

.info-item:last-child{
  margin-bottom:0;
}

.info-label{
  opacity:.6;
  font-size:12px;
  margin-bottom:5px;
}

.ticket-select{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-top:22px;
}

.ticket-card{
  background:rgba(255,255,255,.09);
  border:2px solid transparent;
  border-radius:24px;
  padding:18px;
  cursor:pointer;
  transition:.25s;
}

.ticket-card.active{
  border-color:#ffe7a3;
  background:rgba(255,231,163,.12);
}

.ticket-type{
  font-size:18px;
  margin-bottom:10px;
}

.ticket-id{
  font-family:'DM Mono', monospace;
  opacity:.85;
  font-size:13px;
}

.complete-card{
  text-align:center;
  background:rgba(255,255,255,.08);
  border-radius:30px;
  padding:32px 22px;
  border:1px solid rgba(255,255,255,.1);
}

.complete-icon{
  font-size:54px;
  margin-bottom:18px;
}

.complete-title{
  font-size:28px;
  margin-bottom:14px;
}

.reservation-number{
  margin-top:18px;
  font-family:'DM Mono', monospace;
  color:#ffe7a3;
}

.reservation-list{
  margin-top:20px;
}

.reservation-card{
  background:rgba(255,255,255,.08);
  border-radius:24px;
  padding:20px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,.1);
}

.reservation-title{
  font-size:20px;
  margin-bottom:12px;
}

.small{
  opacity:.72;
  font-size:13px;
  line-height:1.8;
}

.empty{
  text-align:center;
  opacity:.7;
  padding:50px 20px;
}

.wave{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  pointer-events:none;
}

</style>
</head>

<body>

<svg class="wave" viewBox="0 0 1440 320" preserveAspectRatio="none">
<path fill="#d7c4a0"
fill-opacity="1"
d="M0,224L48,213.3C96,203,192,181,288,186.7C384,192,480,224,576,229.3C672,235,768,213,864,181.3C960,149,1056,107,1152,106.7C1248,107,1344,149,1392,170.7L1440,192L1440,320L0,320Z"></path>
</svg>

<div class="app">

<div class="logo">
<h1>Event Reservation</h1>
<p>What we call Magic!</p>
</div>

<!-- イベント一覧 -->
<div class="page active" id="eventListPage">

<h2 class="section-title">イベント一覧</h2>

<div id="eventList"></div>

<button class="button" onclick="openReservationsPage()">
予約済みイベントを見る
</button>

</div>

<!-- 詳細 -->
<div class="page" id="eventDetailPage">

<button class="button back-button" onclick="showPage('eventListPage')">
← 一覧へ戻る
</button>

<img id="detailImage" class="detail-image">

<h2 id="detailTitle" class="section-title"></h2>

<div id="detailDescription" class="detail-text"></div>

<div class="info-box">

<div class="info-item">
<div class="info-label">実施日時</div>
<div id="detailDate"></div>
</div>

<div class="info-item">
<div class="info-label">所要時間</div>
<div id="detailDuration"></div>
</div>

<div class="info-item">
<div class="info-label">注意事項</div>
<div id="detailNotes"></div>
</div>

</div>

<button class="button" onclick="openReservationPage()">
予約する
</button>

</div>

<!-- 予約確認 -->
<div class="page" id="reservationPage">

<button class="button back-button" onclick="showPage('eventDetailPage')">
← 詳細へ戻る
</button>

<h2 class="section-title">予約確認</h2>

<div class="info-box">

<div class="info-item">
<div class="info-label">予約イベント</div>
<div id="reserveEventTitle"></div>
</div>

<div class="info-item">
<div class="info-label">日時</div>
<div id="reserveEventDate"></div>
</div>

</div>

<div class="ticket-select" id="ticketList"></div>

<button class="button" onclick="confirmReservation()">
予約を確定する
</button>

</div>

<!-- 完了 -->
<div class="page" id="completePage">

<div class="complete-card">

<div class="complete-icon">✨</div>

<div class="complete-title">
予約が完了しました
</div>

<div id="completeEventName"></div>

<div class="reservation-number" id="reservationNumber"></div>

<button class="button" onclick="openReservationsPage()">
予約一覧を見る
</button>

</div>

</div>

<!-- 予約一覧 -->
<div class="page" id="reservationsPage">

<button class="button back-button" onclick="showPage('eventListPage')">
← イベント一覧へ
</button>

<h2 class="section-title">予約済みイベント</h2>

<div id="reservationsList" class="reservation-list"></div>

</div>

</div>

<script>

const STORAGE_KEY = 'wwcm_tickets';
const RESERVATION_KEY = 'wwcm_reservations';

const GAS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';

const events = [

{
  id:'event_001',
  title:'Fantasmic Night',
  shortDesc:'夜の水上ショーを特別観覧席で体験',
  description:'巨大なハーバーを舞台に、光・炎・噴水・音楽が融合するナイトスペクタクル。限定エリアからゆったり鑑賞できます。',
  date:'2026/06/10',
  time:'19:30',
  duration:'約40分',
  notes:'途中退出不可',
  image:'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1200&auto=format&fit=crop'
},

{
  id:'event_002',
  title:'Harbor Greeting',
  shortDesc:'キャラクターによる期間限定グリーティング',
  description:'キャラクターたちがハーバーを巡るスペシャルグリーティングイベント。',
  date:'2026/06/12',
  time:'15:00',
  duration:'約25分',
  notes:'雨天時内容変更',
  image:'https://images.unsplash.com/photo-1505236858219-8359eb29e329?q=80&w=1200&auto=format&fit=crop'
},

{
  id:'event_003',
  title:'Magical Orchestra',
  shortDesc:'生演奏によるプレミアム音楽体験',
  description:'テーマパーク楽曲を中心に構成されたナイトオーケストラ公演。',
  date:'2026/06/18',
  time:'20:00',
  duration:'約55分',
  notes:'全席指定',
  image:'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop'
}

];

let selectedEvent = null;
let selectedTicketId = null;

function showPage(id){

document.querySelectorAll('.page').forEach(page=>{
  page.classList.remove('active');
});

document.getElementById(id).classList.add('active');

window.scrollTo({
  top:0,
  behavior:'smooth'
});

}

function renderEvents(){

const container = document.getElementById('eventList');

container.innerHTML = '';

events.forEach(event=>{

container.innerHTML += `

<div class="event-card">

<img class="event-image" src="${event.image}">

<div class="event-body">

<div class="event-title">${event.title}</div>

<div class="event-desc">
${event.shortDesc}
</div>

<div class="event-time">
${event.date} ${event.time}
</div>

<button class="button"
onclick="openDetail('${event.id}')">
詳細を見る
</button>

</div>

</div>

`;

});

}

function openDetail(id){

selectedEvent = events.find(e=>e.id === id);

document.getElementById('detailImage').src =
selectedEvent.image;

document.getElementById('detailTitle').textContent =
selectedEvent.title;

document.getElementById('detailDescription').textContent =
selectedEvent.description;

document.getElementById('detailDate').textContent =
`${selectedEvent.date} ${selectedEvent.time}`;

document.getElementById('detailDuration').textContent =
selectedEvent.duration;

document.getElementById('detailNotes').textContent =
selectedEvent.notes;

showPage('eventDetailPage');

}

function openReservationPage(){

const tickets =
JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

if(tickets.length === 0){

alert('先にチケットを取得してください');

return;

}

document.getElementById('reserveEventTitle').textContent =
selectedEvent.title;

document.getElementById('reserveEventDate').textContent =
`${selectedEvent.date} ${selectedEvent.time}`;

const list =
document.getElementById('ticketList');

list.innerHTML = '';

tickets.forEach(ticket=>{

const typeMap = {
  adult:'大人',
  middle:'中人',
  child:'小人'
};

list.innerHTML += `

<div class="ticket-card"
onclick="selectTicket('${ticket.id}', this)">

<div class="ticket-type">
${typeMap[ticket.type] || 'チケット'}
</div>

<div class="ticket-id">
${ticket.id}
</div>

</div>

`;

});

showPage('reservationPage');

}

function selectTicket(id, element){

selectedTicketId = id;

document.querySelectorAll('.ticket-card')
.forEach(card=>{
  card.classList.remove('active');
});

element.classList.add('active');

}

function generateReservationId(){

const now = new Date();

const y =
now.getFullYear();

const m =
String(now.getMonth()+1).padStart(2,'0');

const d =
String(now.getDate()).padStart(2,'0');

const random =
Math.floor(Math.random()*9000)+1000;

return `RES-${y}${m}${d}-${random}`;

}

async function confirmReservation(){

if(!selectedTicketId){

alert('チケットを選択してください');

return;

}

const reservationId =
generateReservationId();

const reservation = {

reservationId,

eventId:selectedEvent.id,

eventTitle:selectedEvent.title,

eventDate:selectedEvent.date,

eventTime:selectedEvent.time,

ticketId:selectedTicketId,

reservedAt:new Date().toISOString()

};

const current =
JSON.parse(localStorage.getItem(RESERVATION_KEY) || '[]');

current.push(reservation);

localStorage.setItem(
RESERVATION_KEY,
JSON.stringify(current)
);

try{

if(GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL'){

await fetch(GAS_URL,{

method:'POST',

mode:'no-cors',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify(reservation)

});

}

}catch(error){

console.log(error);

}

document.getElementById('completeEventName')
.textContent =
selectedEvent.title;

document.getElementById('reservationNumber')
.textContent =
reservationId;

showPage('completePage');

}

function openReservationsPage(){

const reservations =
JSON.parse(localStorage.getItem(RESERVATION_KEY) || '[]');

const list =
document.getElementById('reservationsList');

if(reservations.length === 0){

list.innerHTML = `
<div class="empty">
予約済みイベントはありません
</div>
`;

showPage('reservationsPage');

return;

}

list.innerHTML = '';

reservations.reverse().forEach(item=>{

list.innerHTML += `

<div class="reservation-card">

<div class="reservation-title">
${item.eventTitle}
</div>

<div class="small">

日時<br>
${item.eventDate} ${item.eventTime}

<br><br>

使用チケット<br>
${item.ticketId}

<br><br>

予約番号<br>
${item.reservationId}

</div>

</div>

`;

});

showPage('reservationsPage');

}

renderEvents();

</script>

</body>
</html>
