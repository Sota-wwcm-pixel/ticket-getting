<script>
  let scanning = false;
  let stream = null;
  const scannedIds = new Set();
  const history = [];

  async function startScan() {
    if (scanning) return;

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });

      const video = document.getElementById('video');
      video.srcObject = stream;

      // ←これ重要
      await video.play();

      document.getElementById('startBtn').textContent =
        '📷 スキャン中...';
      document.getElementById('startBtn').disabled = true;

      scanning = true;

      requestAnimationFrame(tick);

    } catch (e) {
      console.error(e);
      alert('カメラへのアクセスが拒否されました。ブラウザ設定を確認してください。');
    }
  }

  function tick() {
    if (!scanning) return;

    const video = document.getElementById('video');

    if (video.readyState !== video.HAVE_ENOUGH_DATA) {
      requestAnimationFrame(tick);
      return;
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(
      0,
      0,
      canvas.width,
      canvas.height
    );

    // ←認識感度UP
    const code = jsQR(
      imageData.data,
      imageData.width,
      imageData.height,
      {
        inversionAttempts: 'attemptBoth'
      }
    );

    if (code) {
      console.log('QR検出:', code.data);

      try {
        const data = JSON.parse(code.data);

        if (data.id) {

          if (scannedIds.has(data.id)) {
            showResult('duplicate', data);
            addHistory('error', data.id);

          } else {
            scannedIds.add(data.id);
            showResult('success', data);
            addHistory('success', data.id);
          }

          scanning = false;

          setTimeout(() => {
            scanning = true;
            requestAnimationFrame(tick);
          }, 3000);

          return;
        }

      } catch (e) {
        console.error('JSON parse error', e);

        showResult('error');
        addHistory('error', '不明');

        scanning = false;

        setTimeout(() => {
          scanning = true;
          requestAnimationFrame(tick);
        }, 2000);

        return;
      }
    }

    requestAnimationFrame(tick);
  }
</script>
