<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読み取り機 — What we call Magic !</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  text-align:center;
  margin:0;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

#video{
  width:100%;
  max-width:420px;
  border-radius:16px;
  background:black;
}

button{
  margin-top:16px;
  padding:14px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

#result{
  margin-top:20px;
  font-size:18px;
}

#history{
  margin-top:24px;
  text-align:left;
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
}
</style>
</head>

<body>

<h1>QR読み取り機</h1>

<video
  id="video"
  autoplay
  playsinline
></video>

<br>

<button id="startBtn" onclick="startScan()">
  📷 カメラ起動
</button>

<div id="result"></div>

<div id="history"></div>

<script>
let scanning = false;
let stream = null;
const scannedIds = new Set();

async function startScan() {
  if (scanning) return;

  try {
    const video =
      document.getElementById('video');

    stream =
      await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment'
        }
      });

    video.srcObject = stream;

    await video.play();

    scanning = true;

    document.getElementById(
      'startBtn'
    ).textContent =
      '📷 スキャン中...';

    requestAnimationFrame(tick);

  } catch (e) {
    console.error(e);
    alert('カメラを起動できませんでした');
  }
}

function tick() {
  if (!scanning) return;

  const video =
    document.getElementById('video');

  if (
    video.readyState !==
    video.HAVE_ENOUGH_DATA
  ) {
    requestAnimationFrame(tick);
    return;
  }

  const canvas =
    document.createElement('canvas');

  canvas.width =
    video.videoWidth;

  canvas.height =
    video.videoHeight;

  const ctx =
    canvas.getContext('2d');

  ctx.drawImage(video, 0, 0);

  const imageData =
    ctx.getImageData(
      0,
      0,
      canvas.width,
      canvas.height
    );

  const code = jsQR(
  imageData.data,
  imageData.width,
  imageData.height,
  {
    inversionAttempts: 'attemptBoth'
  }
);

// デバッグ
if (Math.random() < 0.02) {
  console.log(
    'scan running',
    imageData.width,
    imageData.height
  );
}

if (code) {
  console.log('QR FOUND');
  console.log(code.data);
}

  if (code) {
    try {
      const data =
        JSON.parse(code.data);

      const result =
        document.getElementById(
          'result'
        );

      if (
        scannedIds.has(data.id)
      ) {
        result.innerHTML =
          '⚠️ 使用済み: ' +
          data.id;

      } else {
        scannedIds.add(data.id);

        result.innerHTML =
          '✅ 入場OK<br>' +
          data.id +
          '<br>' +
          (data.type === 'adult'
            ? '大人'
            : '子供') +
          ' / ' +
          data.count +
          '枚';
      }

      const history =
        document.getElementById(
          'history'
        );

      history.innerHTML =
        '<div>' +
        new Date().toLocaleTimeString()
        + ' - ' +
        data.id +
        '</div>' +
        history.innerHTML;

      scanning = false;

      setTimeout(() => {
        scanning = true;
        requestAnimationFrame(tick);
      }, 3000);

      return;

    } catch (e) {
      console.error(e);
    }
  }

  requestAnimationFrame(tick);
}
</script>

</body>
</html>
