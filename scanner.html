<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読み取り機 — What we call Magic !</title>
<link href="https://googleapis.com" rel="stylesheet">
<script src="https://cloudflare.com"></script>
<style>
  :root {
    --navy: #0a1628;
    --deep-blue: #0d2247;
    --blue: #1a3a6e;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cyan: #00b4d8;
    --white: #f8f4ee;
    --green: #27ae60;
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1.5rem 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(201,168,76,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .staff-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--cyan);
    border: 1px solid rgba(0,180,216,0.3);
    border-radius: 99px;
    padding: 0.25rem 0.75rem;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 0.7rem;
    color: rgba(248,244,238,0.4);
    letter-spacing: 0.1em;
  }

  /* Scanner */
  .scanner-card {
    background: linear-gradient(135deg, rgba(13,34,71,0.9) 0%, rgba(26,58,110,0.6) 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    margin-bottom: 1.5rem;
  }

  .scanner-label {
    padding: 1rem 1.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .scanner-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(201,168,76,0.3), transparent);
  }

  .video-wrap {
    position: relative;
    aspect-ratio: 1;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 60%;
    aspect-ratio: 1;
    border: 2px solid var(--gold);
    border-radius: 8px;
    position: relative;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }

  .scan-frame::before,
  .scan-frame::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--cyan);
    border-style: solid;
  }

  .scan-frame::before {
    top: -2px; left: -2px;
    border-width: 3px 0 0 3px;
    border-radius: 4px 0 0 0;
  }

  .scan-frame::after {
    bottom: -2px; right: -2px;
    border-width: 0 3px 3px 0;
    border-radius: 0 0 4px 0;
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--cyan), transparent);
    animation: scanLine 2s ease-in-out infinite;
    top: 0;
  }

  @keyframes scanLine {
    0% { top: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  /* 【新規追加】カメラ起動ボタンのスタイル */
  .start-btn {
    width: 100%;
    padding: 1.2rem;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none;
    color: var(--navy);
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.2s;
    display: block;
    text-align: center;
  }

  .start-btn:hover {
    opacity: 0.95;
    box-shadow: 0 0 15px rgba(201,168,76,0.4);
  }

  /* Result */
  .result-card {
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: none;
    animation: resultIn 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }

  .result-card.visible { display: block; }

  @keyframes resultIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .result-card.success {
    background: linear-gradient(135deg, rgba(39,174,96,0.2) 0%, rgba(39,174,96,0.1) 100%);
    border: 1px solid rgba(39,174,96,0.4);
  }

  .result-card.error {
    background: linear-gradient(135deg, rgba(192,57,43,0.2) 0%, rgba(192,57,43,0.1) 100%);
    border: 1px solid rgba(192,57,43,0.4);
  }

  .result-icon {
    font-size: 2.5rem;
    text-align: center;
    margin-bottom: 0.75rem;
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .result-card.success .result-title { color: #2ecc71; }
  .result-card.error .result-title { color: #e74c3c; }

  .result-detail {
    font-size: 0.8rem;
    color: rgba(248,244,238,0.6);
    text-align: center;
    line-height: 1.7;
  }

  .result-info {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-top: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: rgba(248,244,238,0.6);
    line-height: 1.8;
  }

  /* History */
  .history-card {
    background: linear-gradient(135deg, rgba(13,34,71,0.9) 0%, rgba(26,58,110,0.6) 100%);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    overflow: hidden;
  }

  .history-label {
    padding: 1rem 1.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--gold-light);
  }

  .history-list {
    max-height: 200px;
    overflow-y: auto;
  }

  .history-item {
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.75rem;
  }

  .history-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .history-dot.success { background: var(--green); }
  .history-dot.error { background: var(--red); }

  .history-id {
    font-family: 'DM Mono', monospace;
    color: rgba(248,244,238,0.7);
    flex: 1;
  }

  .history-time {
    color: rgba(248,244,238,0.3);
    font-family: 'DM Mono', monospace;
  }

  .empty-history {
    padding: 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(248,244,238,0.3);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="staff-badge">Staff Only</div>
    <div class="title">入場 読み取り機</div>
    <div class="subtitle">What we call Magic ! — 本郷祭 2025</div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-info" id="resultInfo" style="display:none"></div>

    <!-- 【新規追加】スキャナーカードの最下部にボタンを配置 -->
    <button class="start-btn" id="startBtn">カメラを起動する</button>
  </div>

  <div class="history-card">
    <div class="history-label">
      <span>スキャン履歴</span>
      <span class="history-count" id="historyCount">0件</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history" id="emptyHistory">履歴はありません</div>
    </div>
  </div>
</div>
