<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>スタンプラリー</title>

<style>
:root{
    --blue:#4E88BC;
    --beige:#F6EEE4;
    --text:#314255;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
    background:
        linear-gradient(180deg,#edf7ff 0%,#f7efe3 100%);
    color:var(--text);
}

.header{
    padding:
        calc(env(safe-area-inset-top) + 26px)
        22px
        28px;
    background:
        linear-gradient(180deg,#4E88BC,#79B5DF);
    color:white;
    border-radius:0 0 34px 34px;
}

.progress{
    margin-top:14px;
}

.bar{
    height:12px;
    background:rgba(255,255,255,.28);
    border-radius:999px;
    overflow:hidden;
}

.fill{
    width:50%;
    height:100%;
    background:white;
}

.content{
    padding:24px 18px 120px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
}

.stamp{
    background:rgba(255,255,255,.84);
    backdrop-filter:blur(18px);
    border-radius:28px;
    aspect-ratio:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:20px;
    text-align:center;
    box-shadow:0 10px 26px rgba(0,0,0,.08);
}

.done{
    border:3px solid #4E88BC;
}

.empty{
    opacity:.4;
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<header class="header">
    <h1>📍 スタンプラリー</h1>

    <div class="progress">
        4 / 8 COMPLETE

        <div class="bar">
            <div class="fill"></div>
        </div>
    </div>
</header>

<main class="content">

    <div class="grid">

        <div class="stamp done">
            <div class="icon">🎭</div>
            演劇部
        </div>

        <div class="stamp done">
            <div class="icon">✨</div>
            D研究会
        </div>

        <div class="stamp done">
            <div class="icon">🎵</div>
            軽音
        </div>

        <div class="stamp done">
            <div class="icon">🍔</div>
            食販
        </div>

        <div class="stamp empty">
            <div class="icon">❔</div>
            未獲得
        </div>

        <div class="stamp empty">
            <div class="icon">❔</div>
            未獲得
        </div>

    </div>

</main>

</body>
</html>
